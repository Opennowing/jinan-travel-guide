name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy data files and offline page
        run: |
          mkdir -p dist/data
          cp src/data/spots.json dist/data/ 2>/dev/null || true
          cp src/data/food.json dist/data/ 2>/dev/null || true
          cp public/data/* dist/data/ 2>/dev/null || true
          cp offline.html dist/offline.html 2>/dev/null || true
          cp public/sw.js dist/sw.js 2>/dev/null || true
          cp -r public/icons dist/icons 2>/dev/null || true
          touch dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
