name: PR Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages-preview

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoUrl = `${context.repo.owner}/${context.repo.repo}`;
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;

            const body = [
              `## 🚀 PR Preview Deployed`,
              ``,
              `| Info | Detail |`,
              `|------|--------|`,
              `| **Branch** | \`gh-pages-preview\` |`,
              `| **Preview URL** | ${previewUrl} |`,
              `| **PR** | #${prNumber} |`,
              ``,
              `> ⚠️ This is a preview deployment. The preview branch will be overwritten by the next PR.`,
            ].join('\n');

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('PR Preview Deployed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
