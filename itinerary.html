    .timeline{position:relative;padding-left:32px}

    .timeline-day-header{position:relative;font:700 1.2rem/1 var(--serif);color:var(--accent);margin-bottom:20px;padding:8px 0}
    .timeline-day-header::before{content:'';position:absolute;left:-26px;top:6px;width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);box-shadow:0 0 0 2px var(--accent)}
    .timeline-item{position:relative;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:12px;transition:all .3s var(--ease)}

    .timeline-item::before{content:'';position:absolute;left:-26px;top:22px;width:8px;height:8px;border-radius:50%;background:var(--bg3);border:2px solid var(--accent)}
    .ti-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
    .ti-time{font:600 .8rem/1 var(--sans);color:var(--accent);background:var(--accent2);padding:3px 10px;border-radius:100px}
    .ti-name{font:700 .95rem/1.3 var(--serif)}
    .ti-details{display:flex;gap:16px;flex-wrap:wrap;font-size:.8rem;color:var(--text2)}

    .route-badge.medium{background:rgba(201,169,110,.15);color:var(--accent)}

    .my-trip-timeline-item .tl-name{font-weight:600;color:var(--text)}
    .export-panel{margin-top:16px;padding:16px;background:var(--bg2);border-radius:var(--radius);display:none}

    .export-panel textarea{width:100%;min-height:120px;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-family:var(--sans);font-size:.85rem;resize:vertical;outline:none;color:var(--text)}

    .share-bar{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
    .panel{display:none}
    .panel.active{display:block}

      .route-header{flex-direction:column;align-items:flex-start}
      .route-tabs,.season-tabs{justify-content:flex-start;flex-wrap:nowrap}
    }
  </style>
</head>

  <script type="module">
    import { initAll, stars } from '/src/components/shared.js';
    import { initPWA } from '/src/components/pwa.js';
    import { initSocialFeatures } from '/src/components/social.js';
    initPWA();
    initAll();
    initSocialFeatures();

    let spotsData = [], foodData = [];

    async function loadData() {
      const [spotsRes, foodRes] = await Promise.all([
        fetch('/src/data/spots.json'), fetch('/src/data/food.json')
      ]);
      spotsData = await spotsRes.json();
      const foodJson = await foodRes.json();

    function renderRoute(routeKey) {
      const route = routes[routeKey];
      if (!route) return;
      const diffLabel = { easy: '轻松', medium: '适中', hard: '挑战' };
      let html = `
        <div class="route-header">
          <div>
            <h2>${route.title}</h2>
            <p style="color:var(--text2);margin-top:4px">${route.desc}</p>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span class="route-badge ${route.difficulty}">${diffLabel[route.difficulty]}</span>
            <span class="route-meta"><span>⏱ ${route.duration}</span><span>💰 ${route.cost}</span><span>🚶 ${route.distance}</span><span>👥 ${route.bestFor}</span></span>
          </div>
        </div>
        <div class="timeline">`;

      route.days.forEach(day => {
        html += `<div class="timeline-day"><div class="timeline-day-header">${day.header}</div>`;
        let dayCost = 0;
        day.items.forEach(item => {
          const costNum = parseInt(item.cost.replace(/[^0-9]/g, '')) || 0;
          dayCost += costNum;
          html += `
            <div class="timeline-item">
              <div class="ti-top">
                <span class="ti-time">${item.time}</span>
                <span class="ti-name">${item.icon} ${item.name}</span>
              </div>
              <div class="ti-details">
                <span>${item.details}</span>
              </div>
              <div class="ti-details" style="margin-top:6px">
                <span class="ti-cost">💰 ${item.cost}</span>
                <span class="ti-transport">🚌 ${item.transport}</span>
                ${item.tips ? `<span>💡 ${item.tips}</span>` : ''}
              </div>
            </div>`;
        });
        html += `<div class="day-total">当日预算约 <strong>¥${dayCost}</strong></div></div>`;
      });

      html += '</div>';

      // Cost summary
      const totalTickets = route.days.reduce((sum, d) => sum + d.items.reduce((s, i) => s + (parseInt(i.cost.replace(/[^0-9]/g, '')) || 0), 0), 0);
      html += `
        <div class="cost-summary">
          <div class="cost-card"><div class="label">🎫 门票</div><div class="amount">¥${Math.round(totalTickets * 0.3)}</div><div class="note">预估总和</div></div>
          <div class="cost-card"><div class="label">🍜 餐饮</div><div class="amount">¥${Math.round(totalTickets * 0.4)}</div><div class="note">预估总和</div></div>
          <div class="cost-card"><div class="label">🚌 交通</div><div class="amount">¥${Math.round(totalTickets * 0.2)}</div><div class="note">预估总和</div></div>
          <div class="cost-card"><div class="label">💰 总计</div><div class="amount">¥${totalTickets}</div><div class="note">所有费用</div></div>
        </div>`;

      document.getElementById('routeContent').innerHTML = html;
    }

    // ── My Trip (with drag, export, timeline) ──
    let draggedItem = null;
    let draggedIndex = -1;

    function parseDuration(dur) {
      if (!dur) return 60;
      if (dur.includes('min')) {
        const m = parseInt(dur);
        return isNaN(m) ? 60 : m;
      }
      // Handle "2-3h" → take first number, "2.5h" → 2.5
      const hMatch = dur.match(/([\d.]+)\s*-?\s*[\d.]*\s*h/);
      if (hMatch) return Math.round(parseFloat(hMatch[1]) * 60);
      const num = parseInt(dur);
      return isNaN(num) ? 60 : num * 60;
    }

    function renderMyTrip() {
      const ids = JSON.parse(localStorage.getItem('jinan-itinerary') || '[]');
      const list = document.getElementById('myTripList');
      const timeline = document.getElementById('myTripTimeline');

      if (!ids.length) {
        list.innerHTML = '<div class="my-trip-empty">📌 还没有添加景点<br><small>去 <a href="spots.html" style="color:var(--accent)">景点页面</a> 点击「加入行程」</small></div>';
        timeline.style.display = 'none';
        return;
      }

      list.innerHTML = ids.map((id, idx) => {
        const s = spotsData.find(x => x.id === id);
        if (!s) return '';
        return `<div class="my-trip-item" draggable="true" data-index="${idx}" data-id="${s.id}">
          <span class="drag-handle">⠿</span>
          <div class="trip-info">
            <div class="trip-name">${s.name}</div>

          <button class="remove-btn" data-id="${s.id}">✕</button>
        </div>`;
      }).join('');

      // Render timeline
      renderTimeline(ids);

      // Remove buttons
      list.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const newIds = ids.filter(id => id !== btn.dataset.id);
          localStorage.setItem('jinan-itinerary', JSON.stringify(newIds));
          renderMyTrip();
        });
      });

      // Drag & Drop
      list.querySelectorAll('.my-trip-item').forEach(item => {
        item.addEventListener('dragstart', e => {
          draggedItem = item;
          draggedIndex = parseInt(item.dataset.index);
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          list.querySelectorAll('.my-trip-item').forEach(el => el.classList.remove('drag-over'));
          draggedItem = null;
          draggedIndex = -1;
        });
        item.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', () => {
          item.classList.remove('drag-over');
        });
        item.addEventListener('drop', e => {
          e.preventDefault();
          item.classList.remove('drag-over');
          const targetIndex = parseInt(item.dataset.index);
          if (draggedIndex === targetIndex || draggedIndex < 0) return;
          const currentIds = JSON.parse(localStorage.getItem('jinan-itinerary') || '[]');
          const [moved] = currentIds.splice(draggedIndex, 1);
          currentIds.splice(targetIndex, 0, moved);
          localStorage.setItem('jinan-itinerary', JSON.stringify(currentIds));
          renderMyTrip();
        });
      });

      // Touch drag for mobile
      let touchStartY = 0, touchItem = null, touchIndex = -1;
      list.querySelectorAll('.my-trip-item').forEach(item => {
        item.addEventListener('touchstart', e => {
          touchStartY = e.touches[0].clientY;
          touchItem = item;
          touchIndex = parseInt(item.dataset.index);
        }, { passive: true });
        item.addEventListener('touchend', e => {
          const touchEndY = e.changedTouches[0].clientY;
          const diff = touchEndY - touchStartY;
          if (Math.abs(diff) < 30 || !touchItem) return;
          const currentIds = JSON.parse(localStorage.getItem('jinan-itinerary') || '[]');
          const direction = diff > 0 ? 1 : -1;
          const newIndex = touchIndex + direction;
          if (newIndex < 0 || newIndex >= currentIds.length) return;
          [currentIds[touchIndex], currentIds[newIndex]] = [currentIds[newIndex], currentIds[touchIndex]];
          localStorage.setItem('jinan-itinerary', JSON.stringify(currentIds));
          renderMyTrip();
        }, { passive: true });
      });
    }

    function renderTimeline(ids) {
      const timeline = document.getElementById('myTripTimeline');
      if (!ids.length) { timeline.style.display = 'none'; return; }
      timeline.style.display = 'block';
      let currentTime = 480; // 08:00 in minutes
      timeline.innerHTML = ids.map((id, i) => {
        const s = spotsData.find(x => x.id === id);

        const m = currentTime % 60;
        const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

    loadData();

    // ── Smart Itinerary Planner ──
    const prefCatMap = {
      culture: ['culture', 'history'],
      food: ['food'],
      nature: ['nature', 'spring'],
      family: ['family']
    };

    function scoreSpot(spot, prefs, budget) {
      let score = 0;
      const cats = [spot.cat, ...(spot.audience || [])];
      prefs.forEach(p => {
        if (prefCatMap[p] && prefCatMap[p].some(c => cats.includes(c))) score += 3;
      });
      // Budget filter
      const p = spot.price || 0;
      if (budget === 'economy' && p <= 40) score += 2;
      else if (budget === 'comfort' && p <= 80) score += 2;
      else if (budget === 'quality') score += 1;
      // Bonus for high rating
      score += (spot.rating || 0) * 0.5;
      // Bonus for must-see
      if (spot.badge === 'must') score += 2;
      return score;
    }

    function parseDurationMin(dur) {
      if (!dur) return 60;
      if (dur.includes('min')) return parseInt(dur) || 60;
      const m = dur.match(/([\d.]+)/);
      return m ? Math.round(parseFloat(m[1]) * 60) : 60;
    }

    document.getElementById('generatePlan')?.addEventListener('click', () => {
      const days = Math.min(5, Math.max(1, parseInt(document.getElementById('planDays').value) || 2));
      const people = Math.min(10, Math.max(1, parseInt(document.getElementById('planPeople').value) || 2));
      const budget = document.getElementById('planBudget').value;
      const prefs = Array.from(document.querySelectorAll('#planPrefs input:checked')).map(cb => cb.value);
      if (!prefs.length) { showToast('请至少选择一个偏好'); return; }

      // Score and sort spots
      const scored = spotsData.map(s => ({ ...s, _score: scoreSpot(s, prefs, budget) }))
        .filter(s => s._score > 0)
        .sort((a, b) => b._score - a._score);

      // Distribute across days (4-6 spots per day)
      const spotsPerDay = Math.min(6, Math.max(3, Math.ceil(scored.length / days)));
      const selected = scored.slice(0, spotsPerDay * days);

      // Budget limits
      const maxDaily = budget === 'economy' ? 150 : budget === 'comfort' ? 300 : 600;

      const dayLabels = ['第一天', '第二天', '第三天', '第四天', '第五天'];
      let html = '';
      let grandTotal = 0;

      for (let d = 0; d < days; d++) {
        const daySpots = selected.slice(d * spotsPerDay, (d + 1) * spotsPerDay);
        if (!daySpots.length) break;
        let dayCost = 0;
        let currentMin = 480; // 08:00

        html += `<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px">

          <div class="timeline" style="padding-left:28px">`;

        daySpots.forEach((spot, i) => {
          const durMin = parseDurationMin(spot.dur);
          const h = Math.floor(currentMin / 60);
          const m = currentMin % 60;
          const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
          const cost = spot.price || 0;
          dayCost += cost;
          currentMin += durMin + 30;

          html += `<div class="timeline-item" style="margin-left:0">
            <div class="ti-top">
              <span class="ti-time">${timeStr}</span>
              <span class="ti-name">${spot.name}</span>
            </div>
            <div class="ti-details">
              <span>${spot.desc?.slice(0, 40) || ''}</span>
            </div>
            <div class="ti-details" style="margin-top:6px">
              <span class="ti-cost">💰 ${cost === 0 ? '免费' : '¥' + cost}</span>
              <span>⏱ ${spot.dur}</span>
              <span class="ti-transport">🚌 ${spot.transport?.slice(0, 20) || '—'}</span>
            </div>
          </div>`;
        });

        html += `</div>
          <div class="day-total">当日预估 <strong>¥${dayCost}</strong> / ${people}人 ≈ ¥${dayCost * people}</div>
        </div>`;
        grandTotal += dayCost;
      }

      html = `<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;display:flex;justify-content:space-around;flex-wrap:wrap;gap:16px">
        <div style="text-align:center"><div style="font-size:.75rem;color:var(--text2)">🎫 门票总计</div><div style="font:700 1.2rem var(--serif);color:var(--accent)">¥${grandTotal}</div></div>
        <div style="text-align:center"><div style="font-size:.75rem;color:var(--text2)">👥 ${people}人总计</div><div style="font:700 1.2rem var(--serif);color:var(--accent)">¥${grandTotal * people}</div></div>
        <div style="text-align:center"><div style="font-size:.75rem;color:var(--text2)">📅 共 ${days} 天</div><div style="font:700 1.2rem var(--serif);color:var(--accent)">${selected.length} 个景点</div></div>
      </div>` + html;

      document.getElementById('planResult').innerHTML = html;
      document.getElementById('planResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ── Expense Tracker ──

        <div style="text-align:center"><div style="font-size:.75rem;color:var(--text2)">实际花费</div><div style="font:700 1.2rem var(--serif);color:var(--accent)">¥${totalActual}</div></div>
        <div style="text-align:center"><div style="font-size:.75rem;color:var(--text2)">差额</div><div style="font:700 1.2rem var(--serif);color:${diffColor}">${diffLabel}</div></div>
      </div>`;

      // Bind input changes
      list.querySelectorAll('input[data-spot-id]').forEach(input => {

    // Hook into itinerary changes
    const _origRenderMyTrip = typeof renderMyTrip === 'function' ? renderMyTrip : null;

    // ── Weather Forecast ──

          const maxC = parseInt(day.maxtempC);
          const minC = parseInt(day.mintempC);
          const hourly = day.hourly || [];
          const noonWeather = hourly.find(h => h.time === '1200') || hourly[4] || hourly[0] || {};
          const desc = noonWeather.weatherDesc?.[0]?.value || '未知';
          const code = noonWeather.weatherCode || '116';
          const icon = weatherIcons[code] || '⛅';
          const humidity = noonWeather.humidity || '--';
          const advice = getClothingAdvice(maxC, minC);

          return `<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-align:center">
            <div style="font-size:.8rem;color:var(--text2);margin-bottom:8px">${date}</div>
            <div style="font-size:3rem;margin-bottom:8px">${icon}</div>
            <div style="font-weight:600;font-size:1rem;margin-bottom:4px">${desc}</div>
            <div style="font:700 1.4rem/1 var(--serif);color:var(--accent);margin-bottom:4px">${minC}° ~ ${maxC}°</div>
            <div style="font-size:.75rem;color:var(--text3);margin-bottom:12px">💧 湿度 ${humidity}%</div>
            <div style="font-size:.8rem;color:var(--text2);background:var(--bg2);padding:8px 12px;border-radius:8px">${advice}</div>
          </div>`;
        }).join('');
      } catch (err) {
        container.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px;grid-column:1/-1">🌤️ 天气数据暂时无法获取，请稍后再试</div>';
      }
    }

    loadWeather();
  </script>
</body>
</html>
