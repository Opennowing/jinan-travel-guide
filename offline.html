<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线模式 — 济南旅游攻略 · 泉城</title>
  <meta name="description" content="网络连接不可用，已缓存的内容仍可正常浏览。">
  <meta name="theme-color" content="#c9a96e">
  <link rel="manifest" href="/jinan-travel-guide/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📶</text></svg>">
  <style>
    :root {
      --bg: #fff; --bg2: #f8f6f3; --bg3: #f0ede8;
      --text: #111; --text2: #555; --text3: #999;
      --accent: #c9a96e; --accent-hover: #b8954e; --accent2: #e8dcc8;
      --teal: #2a9d8f; --coral: #e76f51;
      --border: rgba(0,0,0,.06); --border2: rgba(0,0,0,.08);
      --shadow: 0 2px 12px rgba(0,0,0,.06); --shadow-lg: 0 8px 32px rgba(0,0,0,.1);
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      --serif: 'Noto Serif SC', "Source Han Serif SC", "Songti SC", Georgia, serif;
      --ease: cubic-bezier(.25,.46,.45,.94);
      --ease-out: cubic-bezier(.16,1,.3,1);
      --radius: 16px; --radius-lg: 20px;
    }
    html.dark {
      --bg: #0d0d10; --bg2: #161619; --bg3: #1e1e22;
      --text: #eaeaea; --text2: #999; --text3: #5a5a5a;
      --accent: #d4a853; --accent-hover: #c9953e; --accent2: #2a2318;
      --border: rgba(255,255,255,.06); --border2: rgba(255,255,255,.1);
      --shadow: 0 2px 12px rgba(0,0,0,.25); --shadow-lg: 0 8px 32px rgba(0,0,0,.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background .4s, color .4s;
    }
    .offline-card {
      max-width: 480px;
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 36px;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .offline-icon { font-size: 4rem; margin-bottom: 20px; display: block; }
    h1 {
      font: 800 1.5rem/1.3 var(--serif);
      color: var(--text);
      margin-bottom: 12px;
    }
    p {
      color: var(--text2);
      line-height: 1.7;
      font-size: .95rem;
      margin-bottom: 24px;
    }
    .tips {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: left;
      margin-bottom: 28px;
    }
    .tips h3 {
      font-size: .85rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .tips li {
      font-size: .85rem;
      color: var(--text2);
      padding: 4px 0 4px 16px;
      position: relative;
      list-style: none;
    }
    .tips li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s var(--ease);
    }
    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(201,169,110,.3);
    }
    .status {
      margin-top: 20px;
      font-size: .8rem;
      color: var(--text3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--coral);
      transition: background .3s;
    }
    .status.online .dot { background: #22c55e; }
    .dark-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .3s;
    }
    .dark-toggle:hover { background: var(--accent); color: #fff; }
    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
      .btn:hover { transform: none; }
    }
    @media (max-width: 480px) {
      .offline-card { padding: 36px 24px; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <button class="dark-toggle" aria-label="切换深色模式">🌙</button>
  <div class="offline-card">
    <span class="offline-icon">📶</span>
    <h1>当前为离线模式</h1>
    <p>网络连接不可用，部分功能暂时受限。<br>已缓存的内容仍可正常浏览。</p>
    <div class="tips">
      <h3>💡 你可以尝试</h3>
      <ul>
        <li>检查 Wi-Fi 或移动数据连接</li>
        <li>访问已缓存的页面（首页、景点、美食等）</li>
        <li>刷新页面重新连接</li>
      </ul>
    </div>
    <button class="btn" onclick="location.reload()">🔄 重新加载</button>
    <div class="status" id="netStatus">
      <span class="dot"></span> 网络状态：离线
    </div>
  </div>
  <script>
    // Dark mode
    const html = document.documentElement;
    const darkBtn = document.querySelector('.dark-toggle');
    const saved = localStorage.getItem('jinan-dark');
    if (saved === 'true') html.classList.add('dark');
    darkBtn.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
    darkBtn.addEventListener('click', () => {
      html.classList.toggle('dark');
      const isDark = html.classList.contains('dark');
      localStorage.setItem('jinan-dark', isDark);
      darkBtn.textContent = isDark ? '☀️' : '🌙';
    });

    // Network status
    function updateStatus() {
      const el = document.getElementById('netStatus');
      if (navigator.onLine) {
        el.innerHTML = '<span class="dot"></span> 网络状态：已连接';
        el.classList.add('online');
        setTimeout(() => location.reload(), 1000);
      } else {
        el.innerHTML = '<span class="dot"></span> 网络状态：离线';
        el.classList.remove('online');
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
