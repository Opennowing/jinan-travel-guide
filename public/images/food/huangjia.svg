  <!-- 标签 -->
  <text x="300" y="265" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="16" font-family="PingFang SC, Microsoft YaHei, sans-serif">章丘名吃 · 百年传承</text>
  <!-- 底部标识 -->
  <text x="300" y="370" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="sans-serif">济南美食攻略 · jinan-travel-guide</text>
