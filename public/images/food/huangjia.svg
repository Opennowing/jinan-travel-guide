      <stop offset="0%" style="stop-color:#ca8a04"/>
      <stop offset="100%" style="stop-color:#a16207"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="400" rx="16"/>
  <!-- 装饰元素 -->
  <circle cx="500" cy="80" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="80" cy="350" r="80" fill="rgba(255,255,255,0.06)"/>
  <!-- emoji -->
