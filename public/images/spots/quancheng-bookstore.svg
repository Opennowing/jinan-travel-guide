<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg_quancheng-bookstore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg_quancheng-bookstore)" width="600" height="400" rx="16"/>
  <!-- 装饰圆形 -->
  <circle cx="500" cy="80" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="80" cy="350" r="80" fill="rgba(255,255,255,0.06)"/>
  <circle cx="550" cy="320" r="60" fill="rgba(255,255,255,0.05)"/>
  <!-- emoji -->
  <text x="300" y="160" text-anchor="middle" font-size="64">📚</text>
  <!-- 景点名称 -->
  <text x="300" y="230" text-anchor="middle" fill="white" font-size="32" font-weight="bold" font-family="PingFang SC, Microsoft YaHei, sans-serif">泉城路新华书店</text>
  <!-- 描述 -->
  <text x="300" y="270" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="16" font-family="PingFang SC, Microsoft YaHei, sans-serif">济南最大的书店，有泉水主题阅读区。可以免费阅读，买杯咖啡坐一下午。</text>
  <!-- 底部标识 -->
  <text x="300" y="370" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="sans-serif">济南旅游攻略 · jinan-travel-guide</text>
</svg>