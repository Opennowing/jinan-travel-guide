  <style>
    .filter-section{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;margin-bottom:20px}
    .filter-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .filter-group-label{font-size:.8rem;font-weight:700;color:var(--text);letter-spacing:.06em;margin-right:8px;white-space:nowrap;display:flex;align-items:center;gap:4px}
    .sort-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
    .sort-wrap label{font-size:.75rem;color:var(--text3);white-space:nowrap}
    .sort-select{padding:6px 14px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.75rem;color:var(--text2);cursor:pointer;outline:none;transition:all .3s}
    .sort-select:hover{border-color:var(--accent)}
    .spot-badge{position:absolute;top:12px;left:12px;z-index:2}
    .spot-price{position:absolute;top:12px;left:12px;z-index:2;background:rgba(0,0,0,.6);color:#fff;padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:600;backdrop-filter:blur(4px)}
    .spot-price .free-tag{color:#5eead4}
    .card-body .card-stars{color:#f59e0b;font-size:.75rem;letter-spacing:1px}
    .card-body .desc{-webkit-line-clamp:3;line-clamp:3}
    .card-info{display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:8px;font-size:.75rem;color:var(--text3);align-items:center}
    .card-info .info-item{display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
    .card-info .info-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);opacity:.4}
    .card-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
    .card-actions{display:flex;gap:6px;margin-top:auto;padding-top:10px}
    .card-actions .btn{flex:1;justify-content:center;font-size:.78rem;padding:6px 8px}
    .count-badge{font-size:.75rem;color:var(--text3);font-weight:500}
    .count-badge strong{color:var(--text);font-weight:700;font-size:.85rem}
    .empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
    .empty-state .emoji{font-size:3rem;margin-bottom:12px}
    #map-container{width:100%;height:400px;border-radius:var(--radius-lg);overflow:hidden}
    .custom-marker{background:none!important;border:none!important}
    .leaflet-div-icon{background:none!important;border:none!important}
    .map-legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:12px;font-size:.75rem;color:var(--text2)}
    .map-legend span{display:flex;align-items:center;gap:4px}
    .audience-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
    .audience-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;color:var(--text3)}
    .audience-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.1)}
    .audience-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.25)}
    .modal-gallery{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000}
    .gallery-track{display:flex;transition:transform .4s cubic-bezier(.25,.46,.45,.94);height:100%}
    .gallery-slide{flex:0 0 100%;height:100%}
    .gallery-slide img{width:100%;height:100%;object-fit:cover}
    .gallery-btn{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;z-index:3;transition:all .2s;backdrop-filter:blur(4px)}
    .gallery-btn:hover{background:rgba(0,0,0,.8)}
    .gallery-btn.prev{left:12px}
    .gallery-btn.next{right:12px}
    .gallery-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:3}
    .gallery-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);border:none;cursor:pointer;transition:all .3s}
    .gallery-dot.active{background:#fff;width:20px;border-radius:4px}
    .gallery-counter{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.6);color:#fff;padding:4px 10px;border-radius:100px;font-size:.7rem;font-weight:600;z-index:3;backdrop-filter:blur(4px)}
    .modal-map{width:100%;height:140px;border-radius:10px;overflow:hidden;margin-bottom:16px;position:relative;background:var(--bg3)}
    .modal-map iframe{width:100%;height:100%;border:none}
    .static-map{margin:16px 0;box-shadow:var(--shadow);transition:box-shadow .3s}
    .static-map:hover{box-shadow:var(--shadow-lg)}
    .static-map svg{background:linear-gradient(135deg,var(--bg2),var(--bg3))}
    /* ── 今日推荐 ── */
    .recommend-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:var(--radius-lg);padding:24px 28px;color:#fff;position:relative;overflow:hidden;margin-bottom:24px}
    .recommend-card::before{content:'';position:absolute;top:-30%;right:-10%;width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%}
    .recommend-card .rec-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;opacity:.8;margin-bottom:8px}
    .recommend-card h3{font-size:1.25rem;margin-bottom:6px}
    .recommend-card p{font-size:.85rem;opacity:.9;line-height:1.5}
    .recommend-card .rec-meta{display:flex;gap:16px;margin-top:12px;font-size:.8rem;opacity:.85;flex-wrap:wrap}
    .recommend-card .rec-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:8px 20px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:100px;color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .3s;backdrop-filter:blur(4px)}
    .recommend-card .rec-btn:hover{background:rgba(255,255,255,.35)}
    .rec-season-tag{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.18);padding:4px 12px;border-radius:100px;font-size:.7rem;font-weight:600;backdrop-filter:blur(4px)}
    /* ── 收藏筛选 ── */
    .fav-filter-btn{padding:6px 14px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.75rem;cursor:pointer;transition:all .3s;color:var(--text3);display:flex;align-items:center;gap:4px}
    .fav-filter-btn:hover,.fav-filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.08)}
    .fav-filter-btn .fav-count{background:var(--accent);color:#fff;font-size:.65rem;padding:1px 6px;border-radius:100px;font-weight:700}
    /* ── 卡片按钮 ── */
    .card-fav-btn{position:absolute;top:12px;right:12px;z-index:3;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .25s;backdrop-filter:blur(6px);background:rgba(0,0,0,.35);color:#fff;opacity:1;transform:none}
    .card-fav-btn:hover{background:rgba(239,68,68,.85);transform:scale(1.1)}
    .card-fav-btn.faved{background:rgba(239,68,68,.9)}
    .card-action-icon{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border2);background:var(--bg);border-radius:8px;font-size:.72rem;cursor:pointer;transition:all .2s;color:var(--text3);font-weight:500}
    .card-action-icon:hover{border-color:var(--accent);color:var(--accent);background:var(--accent2)}
    .card-action-icon.active{border-color:var(--teal);color:var(--teal);background:rgba(42,157,143,.08)}
    /* ── 时长筛选 ── */
    .duration-filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
    .duration-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;color:var(--text3)}
    .duration-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.1)}
    .duration-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.25)}
    /* ── 对比面板 ── */
    .compare-bar{position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--bg);border-top:2px solid var(--accent);box-shadow:0 -4px 24px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .35s var(--ease-out);padding:16px 24px;max-height:50vh;overflow-y:auto}
    .compare-bar.open{transform:translateY(0)}
    .compare-bar .compare-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .compare-bar .compare-header h4{font-size:1rem;font-weight:700;margin:0}
    .compare-bar .compare-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text3);padding:4px}
    .compare-table{width:100%;border-collapse:collapse;font-size:.8rem}
    .compare-table th{text-align:left;padding:8px 12px;background:var(--bg2);color:var(--text3);font-weight:600;white-space:nowrap;width:100px;vertical-align:top}
    .compare-table td{padding:8px 12px;border-bottom:1px solid var(--border2);vertical-align:top}
    .compare-table .compare-name{font-weight:700;font-size:.9rem;color:var(--text)}
    .compare-table .compare-remove{color:#ef4444;cursor:pointer;font-size:.75rem;margin-left:4px}
    .compare-open-btn{position:fixed;bottom:20px;right:20px;z-index:350;padding:10px 20px;border-radius:100px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.35);transition:all .3s;display:none;align-items:center;gap:6px}
    .compare-open-btn.show{display:flex}
    .compare-open-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,130,246,.45)}
    /* ── 地图增强 ── */
    .map-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
    .map-legend-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:4px;color:var(--text3)}
    .map-legend-btn:hover,.map-legend-btn.active{border-color:var(--accent);color:var(--accent)}
    .map-legend-btn .legend-dot{width:8px;height:8px;border-radius:50%}
    .locate-btn{padding:6px 14px;border:1px solid var(--teal);background:rgba(42,157,143,.08);border-radius:100px;font-size:.75rem;cursor:pointer;color:var(--teal);font-weight:600;transition:all .3s;display:flex;align-items:center;gap:4px}
    .locate-btn:hover{background:var(--teal);color:#fff}
    /* ── 语音导览 ── */
    .tts-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid var(--accent);background:rgba(42,157,143,.06);border-radius:100px;font-size:.85rem;cursor:pointer;color:var(--accent);font-weight:600;transition:all .3s}
    .tts-btn:hover{background:var(--accent);color:#fff}
    .tts-btn.playing{background:var(--accent);color:#fff;animation:pulse-tts 1.5s infinite}
    @keyframes pulse-tts{0%,100%{box-shadow:0 0 0 0 rgba(42,157,143,.4)}50%{box-shadow:0 0 0 8px rgba(42,157,143,0)}}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 24px;border-radius:100px;font-size:.85rem;font-weight:500;z-index:500;opacity:0;transition:all .3s var(--ease-out);pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .review-form{background:var(--bg2);border-radius:12px;padding:16px;margin-bottom:16px}
    .review-form h5{font-size:.85rem;font-weight:700;margin-bottom:12px}
    .star-input{display:flex;gap:4px;margin-bottom:10px}
    .star-input span{font-size:1.4rem;cursor:pointer;color:var(--text3);transition:color .2s}
    .star-input span.active,.star-input span:hover{color:#f59e0b}
    .review-input{width:100%;padding:10px 14px;border:1px solid var(--border2);background:var(--bg);border-radius:10px;font-size:.85rem;font-family:var(--sans);resize:vertical;min-height:60px;outline:none;transition:border-color .3s}
    .review-input:focus{border-color:var(--accent)}
    .review-submit{margin-top:10px}
    .user-review{border-left:3px solid var(--accent);padding-left:12px}
    @media(max-width:768px){
      .filter-container{padding:16px}
      .filter-section{flex-direction:column;gap:12px}
      .sort-wrap{margin-left:0}
      .audience-bar{padding-left:0}
      .modal{max-height:92vh;border-radius:var(--radius) var(--radius) 0 0}
      .modal-gallery{aspect-ratio:4/3}
      .area-filter-row,.ticket-filter-row{flex-wrap:wrap}
    }
    /* ── 筛选容器 ── */
    .filter-container{background:var(--bg2);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px;border:1px solid var(--border2)}
    .filter-container .filter-section{margin-bottom:12px}
    .filter-container .audience-bar,
    .filter-container .area-filter-row,
    .filter-container .ticket-filter-row{margin-bottom:10px}
    .reset-filters-btn{padding:6px 14px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.75rem;cursor:pointer;transition:all .3s;color:var(--text3);display:flex;align-items:center;gap:4px;white-space:nowrap}
    .reset-filters-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.08)}
    .filter-bottom-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    /* ── 区域筛选 ── */
    .area-filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
    .area-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;color:var(--text3)}
    .area-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.1)}
    .area-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.25)}
    /* ── 门票筛选 ── */
    .ticket-filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
    .ticket-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;color:var(--text3)}
    .ticket-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.1)}
    .ticket-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.25)}

    /* ── 筛选区折叠 ── */
    .filter-collapsible {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, padding 0.3s ease;
      opacity: 0;
      padding: 0 0;
    }
    .filter-collapsible.expanded {
      max-height: 500px;
      opacity: 1;
      padding: 8px 0 0 0;
    }
    .more-filters-btn {
      padding: 6px 16px;
      border: 1px solid var(--border2);
      background: var(--bg);
      border-radius: 100px;
      font-size: .75rem;
      cursor: pointer;
      transition: all .3s;
      color: var(--text3);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .more-filters-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(201,169,110,.08);
    }
    .more-filters-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(201,169,110,.1);
    }
    .more-filters-btn .arrow {
      display: inline-block;
      transition: transform .3s;
      font-size: .6rem;
    }
    .more-filters-btn.active .arrow {
      transform: rotate(180deg);
    }
    .filter-active-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      background: var(--accent);
      color: #fff;
      border-radius: 100px;
      font-size: .6rem;
      font-weight: 700;
      transition: all .3s;
    }
    .audience-btn, .area-btn, .ticket-btn, .duration-btn, .filter-btn {
      transition: all .25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .audience-btn:active, .area-btn:active, .ticket-btn:active, .duration-btn:active, .filter-btn:active {
      transform: scale(0.92);
    }
    .audience-btn.active, .area-btn.active, .ticket-btn.active, .duration-btn.active {
      transform: scale(1);
    }
    .filter-core-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    /* ── 地图 Marker 弹出窗口增强 ── */
    .map-popup-img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 8px 8px 0 0;

    .modal-tag-item.cat-tag { background: rgba(42,157,143,.08); color: var(--teal); border-color: rgba(42,157,143,.2); }
    .modal-tag-item.aud-tag { background: rgba(201,169,110,.08); color: var(--accent); border-color: rgba(201,169,110,.2); }

/* ══════════════════════════════════════
   AIRBNB-STYLE SPOT CARD REDESIGN
   ══════════════════════════════════════ */

/* ── Card Grid Responsive ── */
@media(max-width:520px){
  .card-grid{grid-template-columns:1fr!important}
}

/* ── Card Base (Airbnb style) ── */
.card.airbnb-card {
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--card-bg);
  overflow: hidden;
  transition: transform .35s cubic-bezier(.23,1,.32,1), box-shadow .35s cubic-bezier(.23,1,.32,1);
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
}
.card.airbnb-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 28px rgba(0,0,0,.12), 0 4px 10px rgba(0,0,0,.06);
  border-color: rgba(201,169,110,.15);
}

/* ── Image Area (4:3) ── */
.card.airbnb-card .card-img {
  aspect-ratio: 4/3;
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  background: var(--bg3);
}
.card.airbnb-card .card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .5s cubic-bezier(.23,1,.32,1);
  opacity: 0;
}
.card.airbnb-card .card-img img.img-loaded {
  opacity: 1;
}
.card.airbnb-card:hover .card-img img {
  transform: scale(1.05);
}

/* ── Gradient Overlay ── */
.card.airbnb-card .card-img .img-gradient {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 50%;
  background: linear-gradient(to top, rgba(0,0,0,.65) 0%, rgba(0,0,0,.25) 50%, transparent 100%);
  z-index: 1;
  pointer-events: none;
}

/* ── Spot Name on Image ── */
.card.airbnb-card .card-img .img-spot-name {
  position: absolute;
  bottom: 12px;
  left: 14px;
  right: 14px;
  z-index: 2;
  color: #fff;
  font: 700 1.05rem/1.3 var(--serif);
  text-shadow: 0 1px 4px rgba(0,0,0,.4);
  pointer-events: none;
}

/* ── Badge (top-left) ── */
.card.airbnb-card .spot-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 3;
}

/* ── Favorite Button (top-right, Airbnb style) ── */
.card.airbnb-card .card-fav-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  z-index: 3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all .25s cubic-bezier(.23,1,.32,1);
  background: none;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,.3));
  opacity: 0;
  transform: scale(.8);
  padding: 0;
  line-height: 1;
}
.card.airbnb-card:hover .card-fav-btn,
.card.airbnb-card .card-fav-btn.faved {
  opacity: 1;
  transform: scale(1);
}
@media(hover:none){
  .card.airbnb-card .card-fav-btn{opacity:1;transform:scale(1)}
}
.card.airbnb-card .card-fav-btn:hover {
  transform: scale(1.2);
}
.card.airbnb-card .card-fav-btn .heart {
  font-size: 1.25rem;
  transition: all .25s;
}
.card.airbnb-card .card-fav-btn .heart-outline {
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,.4);
}
.card.airbnb-card .card-fav-btn .heart-filled {
  color: #ff385c;
  filter: drop-shadow(0 1px 4px rgba(255,56,92,.4));
}

/* ── Heart Beat Animation ── */
@keyframes heartBeat {
  0% { transform: scale(1); }
  15% { transform: scale(1.35); }
  30% { transform: scale(.9); }
  45% { transform: scale(1.2); }
  60% { transform: scale(.95); }
  100% { transform: scale(1); }
}
.card.airbnb-card .card-fav-btn.heart-anim .heart {
  animation: heartBeat .6s cubic-bezier(.23,1,.32,1);
}

/* ── Card Body ── */
.card.airbnb-card .card-body {
  padding: 14px 16px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ── Name + Category Tag ── */
.card.airbnb-card .card-name-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.card.airbnb-card .card-name {
  font: 700 .95rem/1.3 var(--serif);
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.card.airbnb-card .card-cat-tag {
  font-size: .65rem;
  padding: 2px 8px;
  border-radius: 100px;
  background: rgba(42,157,143,.08);
  color: var(--teal);
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Rating + Reviews + Duration ── */
.card.airbnb-card .card-rating-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .78rem;
  color: var(--text2);
  flex-wrap: wrap;
}
.card.airbnb-card .card-rating-row .rating-star {
  color: #f59e0b;
  font-weight: 700;
}
.card.airbnb-card .card-rating-row .rating-num {
  font-weight: 700;
  color: var(--text);
}
.card.airbnb-card .card-rating-row .rating-reviews {
  color: var(--text3);
}
.card.airbnb-card .card-rating-row .rating-dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text3);
  opacity: .5;
}

/* ── Price ── */
.card.airbnb-card .card-price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 2px;
}
.card.airbnb-card .price-current {
  font: 700 .9rem/1 var(--serif);
}
.card.airbnb-card .price-free {
  color: #22c55e;
}
.card.airbnb-card .price-paid {
  color: var(--text);
}
.card.airbnb-card .price-old {
  font-size: .75rem;
  color: var(--text3);
  text-decoration: line-through;
  font-weight: 400;
}
.card.airbnb-card .price-unit {
  font-size: .72rem;
  color: var(--text3);
}

/* ── Description (2 lines) ── */
.card.airbnb-card .card-desc {
  font-size: .82rem;
  color: var(--text2);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-top: 2px;
}

/* ── Bottom: Transport + Detail Button ── */
.card.airbnb-card .card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.card.airbnb-card .card-transport {
  font-size: .7rem;
  color: var(--text3);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card.airbnb-card .card-detail-btn {
  font-size: .72rem;
  font-weight: 600;
  color: var(--accent);
  border: 1px solid var(--accent);
  background: none;
  padding: 4px 12px;
  border-radius: 100px;
  cursor: pointer;
  transition: all .25s;
  white-space: nowrap;
  flex-shrink: 0;
}
.card.airbnb-card .card-detail-btn:hover {
  background: var(--accent);
  color: #fff;
}

/* ── Sort Header (Airbnb style) ── */
.sort-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.sort-header .sort-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.sort-header .spot-count-label {
  font-size: .82rem;
  color: var(--text2);
}
.sort-header .spot-count-label strong {
  color: var(--text);
  font-weight: 700;
  font-size: .9rem;
}
.sort-header .sort-pills {
  display: flex;
  gap: 4px;
  background: var(--bg2);
  padding: 4px;
  border-radius: 100px;
  border: 1px solid var(--border);
}
.sort-header .sort-pill {
  padding: 6px 14px;
  border: none;
  background: none;
  border-radius: 100px;
  font-size: .75rem;
  font-weight: 500;
  color: var(--text3);
  cursor: pointer;
  transition: all .25s;
  white-space: nowrap;
}
.sort-header .sort-pill:hover {
  color: var(--text);
  background: var(--bg);
}
.sort-header .sort-pill.active {
  color: #fff;
  background: var(--accent);
  box-shadow: 0 2px 8px rgba(201,169,110,.25);
}

/* ── Skeleton Cards (Airbnb style) ── */
.skeleton-spot-card {
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--card-bg);
}
.skeleton-spot-card .skel-img {
  aspect-ratio: 4/3;
  background: var(--bg3);
  animation: skeletonPulse 1.8s ease-in-out infinite;
}
.skeleton-spot-card .skel-body {
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.skeleton-spot-card .skel-line {
  height: 14px;
  border-radius: 6px;
  background: var(--bg3);
  animation: skeletonPulse 1.8s ease-in-out infinite;
}
.skeleton-spot-card .skel-line.w60 { width: 60%; }
.skeleton-spot-card .skel-line.w40 { width: 40%; }
.skeleton-spot-card .skel-line.w80 { width: 80%; }
.skeleton-spot-card .skel-line.w100 { width: 100%; }
.skeleton-spot-card .skel-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.skeleton-spot-card .skel-circle {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--bg3);
  animation: skeletonPulse 1.8s ease-in-out infinite;
}
.skeleton-spot-card .skel-pill {
  height: 22px;
  width: 48px;
  border-radius: 100px;
  background: var(--bg3);
  animation: skeletonPulse 1.8s ease-in-out infinite;
}

.modal-section {

/* ── Floating Action Bar ── */
.modal-floating-actions {

.modal-floating-actions .btn {

}

/* ── Mobile Responsive ── */

/* ── Meta Quick Summary Bar ── */
.modal-meta-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;

  margin: 10px 0 14px;

}
.modal-meta-bar .meta-dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text3);
  opacity: .4;
  flex-shrink: 0;
}

/* ── Info Grid Collapsible ── */
.modal-info-grid .info-extra {
  display: none;
}
.modal-info-grid.expanded .info-extra {
  display: block;
}
.modal-info-toggle {
  display: flex;
  align-items: center;
  justify-content: center;

  padding: 8px;
  margin-top: 8px;

  color: var(--text3);
  transition: all .25s;
  width: 100%;

}

}
.modal-info-toggle.expanded .toggle-arrow {
  transform: rotate(180deg);
}

/* ── Review Helpful Button ── */
.review-helpful {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border: 1px solid var(--border2);
  background: var(--bg);
  border-radius: 100px;
  font-size: .72rem;
  color: var(--text3);

  transition: all .25s;

}

}
.review-helpful.active {

}

/* ── Rating Bar Visualization ── */
.rating-bars {
  display: flex;
  flex-direction: column;
  gap: 4px;

}
.rating-bar-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .75rem;
}
.rating-bar-label {
  width: 40px;
  text-align: right;
  color: var(--text3);
  font-weight: 500;
}
.rating-bar-track {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}
.rating-bar-fill {
  height: 100%;

  border-radius: 3px;
  transition: width .6s cubic-bezier(.23,1,.32,1);
}
.rating-bar-count {
  width: 30px;
  font-size: .7rem;
  color: var(--text3);
}

/* ═══ ROUND 3 — MODAL DEEP ENHANCEMENTS ═══ */

/* ── Photo Grid (2x2 actual images) ── */
.modal-photo-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 6px;
  border-radius: 14px;
  overflow: hidden;
  margin: 14px 0;
  aspect-ratio: 16/10;
  cursor: pointer;
}
.modal-photo-grid .photo-main {
  grid-row: 1 / 3;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .4s;
}
.modal-photo-grid .photo-side {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .4s;
}
.modal-photo-grid:hover .photo-main,
.modal-photo-grid:hover .photo-side {
  transform: scale(1.02);
}
.modal-photo-grid .photo-more {
  position: relative;
  cursor: pointer;
}
.modal-photo-grid .photo-more::after {
  content: '📷 更多';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: .85rem;
  font-weight: 600;

}

}
.modal-photo-grid .photo-overlay-tip {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  padding: 6px 10px;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(6px);
  border-radius: 8px;
  color: #fff;
  font-size: .72rem;
  pointer-events: none;
  z-index: 1;
}

/* ── Lightbox ── */
.lightbox-overlay {
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(0,0,0,.95);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}
.lightbox-overlay.open {
  opacity: 1;
  pointer-events: all;
}

  max-height: 85vh;

  border-radius: 8px;
  transition: transform .3s;
}
.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  border: none;
  color: #fff;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .25s;
  backdrop-filter: blur(8px);
}
.lightbox-close:hover {
  background: rgba(255,255,255,.3);
  transform: scale(1.1);
}
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff;
  font-size: 1.4rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .25s;
  backdrop-filter: blur(8px);
}
.lightbox-nav:hover {
  background: rgba(255,255,255,.25);
  transform: translateY(-50%) scale(1.1);
}
.lightbox-nav.prev { left: 20px; }
.lightbox-nav.next { right: 20px; }
.lightbox-counter {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 16px;
  background: rgba(0,0,0,.6);
  border-radius: 100px;
  color: #fff;
  font-size: .8rem;
  font-weight: 600;
  backdrop-filter: blur(8px);
}
.lightbox-dots {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
}
.lightbox-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,.3);
  border: none;
  cursor: pointer;
  transition: all .25s;
  padding: 0;

  width: 24px;
  border-radius: 4px;

  align-items: center;
  justify-content: center;
  font-size: .7rem;
  font-weight: 800;

  height: 8px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
}
.rating-dist-fill {
  height: 100%;
  background: linear-gradient(90deg, #f59e0b, #fbbf24);
  border-radius: 4px;
  transition: width .8s cubic-bezier(.23,1,.32,1);
}
.rating-dist-pct {
  width: 36px;
  font-size: .72rem;
  color: var(--text3);
  font-weight: 500;
  flex-shrink: 0;

  <script type="module">
    import { initAll, stars, openModal, closeModal } from '/src/components/shared.js';
    import { initPWA } from '/src/components/pwa.js';
    import { Favorites, CompareTool, SmartSearch, AccessibilityTools, OfflineManager } from '/src/components/interactive.js';
    import { initShopifyAnimations } from '/src/components/shopify-animations.js';

    // ── Interactive: Favorites + Compare + A11y ──
    const favs = new Favorites();
    const compare = new CompareTool();
    favs._updateBadge();
    const a11y = new AccessibilityTools();
    const toolbarEl = document.createElement('div');
    toolbarEl.innerHTML = a11y.renderToolbar();
    document.body.appendChild(toolbarEl);
    a11y.bindToolbar();
    const offline = new OfflineManager();
    offline.cacheEssentials();

    // Image fallback: generate colorful SVG by name
    window.imgFallback = function(name) {
      const colors = [['#c9a96e','#e8dcc8'],['#2a9d8f','#d4f1ed'],['#e76f51','#fce4de'],['#8b5cf6','#ede9fe'],['#3b82f6','#dbeafe'],['#f59e0b','#fef3c7']];
      const ci = Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0)) % colors.length;
      const [bg,fg] = colors[ci];
      return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400"><rect fill="${bg}" width="600" height="400" rx="12"/><text x="300" y="180" text-anchor="middle" font-size="50">🏔️</text><text x="300" y="250" text-anchor="middle" fill="${fg}" font-size="22" font-family="sans-serif" font-weight="bold">${name}</text><text x="300" y="285" text-anchor="middle" fill="${fg}" font-size="13" font-family="sans-serif" opacity="0.6">济南旅游攻略</text></svg>`)}`;
    };

    import { initSocialFeatures } from '/src/components/social.js';
    initPWA();

    const badgeLabels = { hot: '🔥 热门', must: '⭐ 必去', hidden: '🌿 小众', free: '🆓 免费', kid: '👶 亲子', night: '🌙 夜游', new: '🆕 新增' };
    const catColors = { spring: '#3b82f6', nature: '#22c55e', history: '#a855f7', food: '#f59e0b', landmark: '#ec4899', culture: '#8b5cf6', family: '#14b8a6', amusement: '#f97316' };
    const audienceLabels = { family: '亲子', couple: '情侣', elder: '老人', solo: '独行' };

    // ── CPS Affiliate Config ──
    // 替换为你自己的联盟 ID
    const CPS = {
      ctrip: {
        baseUrl: 'https://m.ctrip.com/webapp/you/article/searchresult.html',
        affId: 'YOUR_CTRIP_AFF_ID',  // 携程联盟 ID
        subId: 'jinan-guide'
      },
      meituan: {
        baseUrl: 'https://i.meituan.com/s/',
        affId: 'YOUR_MEITUAN_AFF_ID'  // 美团联盟 ID
      }
    };

    function getCtripLink(spotName) {
      return `${CPS.ctrip.baseUrl}?keyword=${encodeURIComponent(spotName + ' 门票')}&allianceid=${CPS.ctrip.affId}&sid=${CPS.ctrip.subId}`;
    }
    function getMeituanLink(spotName) {
      return `${CPS.meituan.baseUrl}${encodeURIComponent(spotName)}?ci=111&f=${CPS.meituan.affId}`;
    }
    let allSpots = [], activeCat = 'all', activeAud = 'all', activeArea = 'all', activeTicket = 'all', activeDur = 'all', sortBy = 'recommend', currentGalleryIndex = 0;

    // ── 解析时长字符串为分钟 ──
    function parseDurMinutes(dur) {
      if (!dur) return 60;
      dur = dur.toLowerCase();
      // "半天" → 240, "全天" → 480
      if (dur.includes('全天')) return 480;
      if (dur.includes('半天')) return 240;
      // "2-3小时" → 180, "1.5小时" → 90
      const hMatch = dur.match(/([\d.]+)\s*[~\-到至]\s*([\d.]+)\s*小时/);
      if (hMatch) return parseFloat(hMatch[2]) * 60;
      const hSingle = dur.match(/([\d.]+)\s*小时/);
      if (hSingle) return parseFloat(hSingle[1]) * 60;
      // "30分钟" → 30
      const mMatch = dur.match(/([\d]+)\s*分钟/);
      if (mMatch) return parseInt(mMatch[1]);
      return 60;
    }

    // ── 区域分类（基于经纬度） ──
    function getArea(spot) {
      if (!spot.lat || !spot.lng) return '其他';
      if (spot.lng < 116.98) return '槐荫区';
      if (spot.lng > 117.06) return '历城区';
      if (spot.lat > 36.68 && spot.lng < 117.02) return '天桥区';
      if (spot.lat < 36.64) return '市中区';
      return '历下区';
    }

    // ── 当季推荐判断 ──
    function isSeasonalRecommended(spot) {
      const month = new Date().getMonth() + 1;
      const best = (spot.bestTime || '').toLowerCase();
      const desc = (spot.desc || '').toLowerCase();
      if (month >= 3 && month <= 5 && (best.includes('春') || best.includes('4月') || best.includes('5月') || best.includes('樱花'))) return true;
      if (month >= 6 && month <= 8 && (best.includes('夏') || best.includes('避暑') || desc.includes('清凉'))) return true;
      if (month >= 9 && month <= 11 && (best.includes('秋') || best.includes('红叶') || best.includes('秋色'))) return true;
      if ((month >= 12 || month <= 2) && (best.includes('冬') || best.includes('雾气') || desc.includes('仙境'))) return true;
      return false;
    }

    // ── 拥挤度分类 ──
    function getCrowdLevel(spot) {
      const c = (spot.crowd || '').toLowerCase();
      if (c.includes('爆满') || c.includes('人山人海') || c.includes('很多')) return 'high';
      if (c.includes('人少') || c.includes('清净') || c.includes('不多') || c.includes('私藏')) return 'low';
      return 'medium';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function showSkeletonCards() {
      const grid = document.getElementById("spotGrid");
      let html = "";
      for (let i = 0; i < 8; i++) {
        html += `<div class="skeleton-spot-card">
          <div class="skel-img"></div>
          <div class="skel-body">
            <div class="skel-row"><div class="skel-line w60"></div><div class="skel-pill"></div></div>
            <div class="skel-row"><div class="skel-circle"></div><div class="skel-line w40"></div><div class="skel-circle"></div><div class="skel-line w40"></div></div>
            <div class="skel-line w80"></div>
            <div class="skel-line w100"></div>
          </div>
        </div>`;
      }
      grid.innerHTML = html;
    }

    async function loadSpots() {
      showSkeletonCards();
      try {
        const res = await fetch("/jinan-travel-guide/data/spots.json");
        allSpots = await res.json();
        render();
      } catch (e) {
        console.error("加载景点数据失败:", e);
        document.getElementById("spotGrid").innerHTML = '<div class="empty-state"><div class="emoji">😢</div><p>数据加载失败</p></div>';
      }
    }
    function getFiltered() {
      let list = [...allSpots];
      if (activeCat !== 'all') list = list.filter(s => s.cat === activeCat);
      if (activeAud !== 'all') list = list.filter(s => s.audience.includes(activeAud));
      if (activeArea !== 'all') list = list.filter(s => getArea(s) === activeArea);
      if (activeTicket === 'free') list = list.filter(s => s.price === 0);
      else if (activeTicket === 'paid') list = list.filter(s => s.price > 0);
      else if (activeTicket === 'under50') list = list.filter(s => s.price > 0 && s.price < 50);
      else if (activeTicket === '50to100') list = list.filter(s => s.price >= 50 && s.price <= 100);
      else if (activeTicket === 'over100') list = list.filter(s => s.price > 100);
      // Duration filter
      if (activeDur !== 'all') {
        list = list.filter(s => {
          const dur = (s.dur || '').toLowerCase();
          const mins = parseDurMinutes(dur);
          if (activeDur === '1h') return mins <= 60;
          if (activeDur === '1to3') return mins > 60 && mins <= 180;
          if (activeDur === 'half') return mins > 120 && mins <= 300;
          if (activeDur === 'full') return mins > 300;
          return true;
        });
      }
      switch (sortBy) {
        case 'rating': list.sort((a, b) => b.rating - a.rating); break;
        case 'price': list.sort((a, b) => a.price - b.price); break;
        case 'reviews': list.sort((a, b) => b.reviews - a.reviews); break;
      }
      return list;
    }

    function render() {
      const list = getFiltered();
      const grid = document.getElementById('spotGrid');
      const empty = document.getElementById('emptyState');
      animateCount('spotCount', list.length);
      const itineraries = JSON.parse(localStorage.getItem('jinan-itinerary') || '[]');

      if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      grid.innerHTML = list.map(s => {
        const inIt = itineraries.includes(s.id);
        const isFav = favs.isFavorite(s.id);
        const inCompare = compare.has(s.id);
        const priceHtml = s.price === 0 ? '<span class="free-tag">免费</span>' : `¥${s.price}`;
        return `
          <article class="card rv" data-id="${s.id}">
            <div class="card-img">
              <img src="${s.img}" alt="${s.name}" loading="lazy" onload="this.classList.add('img-loaded');this.parentElement.classList.add('img-loaded')" onerror="this.onerror=null;this.src=imgFallback(this.alt);this.classList.add('img-loaded');this.parentElement.classList.add('img-loaded')">
              <span class="spot-badge badge ${s.badge}">${badgeLabels[s.badge] || s.badge}</span>
              <span class="spot-price">${priceHtml}</span>
              <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${s.id}" aria-label="${isFav ? '取消收藏' : '收藏'}" onclick="event.stopPropagation();window._toggleFav('${s.id}',this)">${isFav ? '♥' : '♡'}</button>
              <button class="compare-btn ${inCompare ? 'active' : ''}" data-id="${s.id}" aria-label="${inCompare ? '取消对比' : '加入对比'}" onclick="event.stopPropagation();window._toggleCompare('${s.id}',this)">${inCompare ? '✓' : '⚖️'}</button>
            </div>
            <div class="card-body">
              <h3>${s.name} <span class="card-stars">${stars(s.rating)}</span></h3>
              <p class="desc">${s.desc}</p>
              <div class="card-meta"><span>⏱ ${s.dur}</span><span>💬 ${s.reviews} 条评价</span></div>
              <div class="card-meta" style="margin-top:4px"><span>🕐 ${(s.open||'全天').split('(')[0].split('·')[0].trim()}</span><span>📅 ${(s.bestTime||'全年').slice(0,12)}</span></div>
              ${s.transport ? `<div class="card-meta" style="margin-top:4px"><span>🚌 ${s.transport.slice(0,20)}</span></div>` : ''}
              <div class="card-tags">${s.audience.map(a => `<span class="tag">${audienceLabels[a]||a}</span>`).join('')}</div>
              <div class="card-actions">
                <a href="${getCtripLink(s.name)}" target="_blank" rel="noopener" class="btn btn-sm btn-outline" style="color:#2681ff;border-color:#2681ff" onclick="event.stopPropagation()">🐬 订票</a>
                <button class="btn btn-sm ${inIt?'btn-outline':'btn-primary'} add-trip" data-id="${s.id}" ${inIt?'disabled':''}>${inIt?'✓ 已加入':'＋ 行程'}</button>
                <button class="btn btn-sm btn-outline detail-btn" data-id="${s.id}">详情</button>
              </div>
            </div>
          </article>`;
      }).join('');

      // Reveal with staggered animation
      initRevealObserver();

      // Card click → Quick View
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', e => {
          if (e.target.closest('.add-trip') || e.target.closest('.detail-btn')) return;
          const s = allSpots.find(x => x.id === card.dataset.id);
          if (s) openQuickView(s);
        });
      });

      // Add trip
      document.querySelectorAll('.add-trip:not([disabled])').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          addToTrip(btn.dataset.id);
          btn.textContent = '✓ 已加入'; btn.classList.remove('btn-primary'); btn.classList.add('btn-outline'); btn.disabled = true;
        });
      });

      // Detail
      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const s = allSpots.find(x => x.id === btn.dataset.id);
          if (s) openQuickView(s);
        });
      });
    }

    // ── Favorites & Compare toggles ──
    window._toggleFav = function(id, btn) {
      const isFav = favs.toggle(id);
      btn.classList.toggle('active', isFav);
      btn.innerHTML = isFav ? '♥' : '♡';
      btn.setAttribute('aria-label', isFav ? '取消收藏' : '收藏');
    };
    window._toggleCompare = function(id, btn) {
      const spot = allSpots.find(s => s.id === id);
      if (!spot) return;
      if (compare.has(id)) {
        compare.remove(id);
        btn.classList.remove('active');
        btn.innerHTML = '⚖️';
        btn.setAttribute('aria-label', '加入对比');
      } else {
        compare.add(spot);
        btn.classList.add('active');
        btn.innerHTML = '✓';
        btn.setAttribute('aria-label', '取消对比');
      }
      updateComparePanel();
    };
    function updateComparePanel() {
      const container = document.getElementById('comparePanel');
      if (!container) return;
      container.innerHTML = compare.renderPanel();
      if (compare.count() > 0) {
        container.querySelector('.compare-panel')?.classList.add('open');
        compare.bindPanel(container);
      }
    }

    function addToTrip(id) {
      const list = JSON.parse(localStorage.getItem('jinan-itinerary') || '[]');
      if (!list.includes(id)) { list.push(id); localStorage.setItem('jinan-itinerary', JSON.stringify(list)); showToast('✓ 已加入行程'); render(); }
    }

    function galleryHtml(s) {
      const imgs = [s.img];
      return `
        <div class="modal-gallery" data-count="${imgs.length}">

    function initGallery() {
      const gallery = document.querySelector('.modal-gallery');
      if (!gallery) return;
      const track = gallery.querySelector('.gallery-track');
      const counter = gallery.querySelector('.gallery-counter');
      const dots = gallery.querySelectorAll('.gallery-dot');
      const total = parseInt(gallery.dataset.count);
      currentGalleryIndex = 0;
      function goTo(i) {
        if (i < 0 || i >= total) return;
        currentGalleryIndex = i;
        track.style.transform = `translateX(-${i*100}%)`;
        if (counter) counter.textContent = `${i+1} / ${total}`;
        dots.forEach((d,idx) => d.classList.toggle('active', idx===i));
      }
      gallery.querySelector('.prev')?.addEventListener('click', e => { e.stopPropagation(); goTo(currentGalleryIndex-1); });
      gallery.querySelector('.next')?.addEventListener('click', e => { e.stopPropagation(); goTo(currentGalleryIndex+1); });
      dots.forEach(d => d.addEventListener('click', e => { e.stopPropagation(); goTo(parseInt(d.dataset.index)); }));
      document.addEventListener('keydown', e => { if(e.key==='ArrowLeft') goTo(currentGalleryIndex-1); if(e.key==='ArrowRight') goTo(currentGalleryIndex+1); });
      let startX=0, moved=false;
      gallery.addEventListener('touchstart', e => { startX=e.touches[0].clientX; moved=false; }, {passive:true});
      gallery.addEventListener('touchmove', () => { moved=true; }, {passive:true});
      gallery.addEventListener('touchend', e => { if(!moved) return; const diff=startX-e.changedTouches[0].clientX; if(Math.abs(diff)>50) goTo(currentGalleryIndex+(diff>0?1:-1)); });
    }

    function getSeason() {
      const m = new Date().getMonth() + 1;
      if (m >= 3 && m <= 5) return 'spring';
      if (m >= 6 && m <= 8) return 'summer';
      if (m >= 9 && m <= 11) return 'autumn';
      return 'winter';
    }
    function getSeasonLabel(s) {
      return { spring: '🌸 春季', summer: '☀️ 夏季', autumn: '🍂 秋季', winter: '❄️ 冬季' }[s] || s;

    function renderRecommend() {
      const area = document.getElementById('recommendArea');

      const season = getSeason();
      const hour = new Date().getHours();
      // Seasonal recommendation logic
      const seasonMap = {

        autumn: { ids: ['hongye','qianfo','lingyan','wufengshan'], reason: '秋高气爽，红叶谷层林尽染，千佛山秋色迷人' },

      };
      const rec = seasonMap[season] || seasonMap.spring;
      // Pick best rated from seasonal list
      const candidates = rec.ids.map(id => allSpots.find(s => s.id === id)).filter(Boolean);
      candidates.sort((a, b) => b.rating - a.rating);
      const pick = candidates[0] || allSpots[0];
      // Night recommendation
      const nightTip = (hour >= 18 || hour < 6) ? '🌙 现在是夜间，推荐夜游景点：趵突泉夜游、宽厚里、护城河灯光秀' : '';
      const priceStr = pick.price === 0 ? '免费' : `¥${pick.price}`;

    function speakSpot(s) {

      if (btn && btn.classList.contains('playing')) {

      if (!('speechSynthesis' in window)) { showToast('浏览器不支持语音合成'); return; }

      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate = 0.92;
      utter.pitch = 1;
      // Try to find a Chinese voice
      const voices = speechSynthesis.getVoices();
      const zhVoice = voices.find(v => v.lang.startsWith('zh'));
      if (zhVoice) utter.voice = zhVoice;
      utter.onend = () => {
        if (btn) { btn.classList.remove('playing'); btn.innerHTML = '🎧 语音导览'; }
        currentTTS = null;
      };
      utter.onerror = () => {
        if (btn) { btn.classList.remove('playing'); btn.innerHTML = '🎧 语音导览'; }
        currentTTS = null;
      };
      speechSynthesis.speak(utter);

    // ═══ LIGHTBOX COMPONENT ═══
    let lightboxPhotos = [];

    function openLightbox(photos, startIndex) {
      lightboxPhotos = photos;
      lightboxIndex = startIndex || 0;
      let overlay = document.getElementById('lightboxOverlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'lightboxOverlay';
        overlay.className = 'lightbox-overlay';
        overlay.innerHTML = `
          <button class="lightbox-close" id="lbClose">✕</button>
          <button class="lightbox-nav prev" id="lbPrev">‹</button>
          <img id="lbImg" src="" alt="">
          <button class="lightbox-nav next" id="lbNext">›</button>
          <div class="lightbox-dots" id="lbDots"></div>
          <div class="lightbox-counter" id="lbCounter"></div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('lbClose').addEventListener('click', closeLightbox);
        document.getElementById('lbPrev').addEventListener('click', () => navigateLightbox(-1));
        document.getElementById('lbNext').addEventListener('click', () => navigateLightbox(1));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeLightbox(); });
        // Touch swipe
        let startX = 0;
        overlay.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
        overlay.addEventListener('touchend', e => {
          const diff = startX - e.changedTouches[0].clientX;
          if (Math.abs(diff) > 50) navigateLightbox(diff > 0 ? 1 : -1);
        }, {passive:true});
      }
      updateLightbox();
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
      const overlay = document.getElementById('lightboxOverlay');
      if (overlay) overlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    
    function navigateLightbox(dir) {
      lightboxIndex = (lightboxIndex + dir + lightboxPhotos.length) % lightboxPhotos.length;
      updateLightbox();
    }
    
    function updateLightbox() {
      const img = document.getElementById('lbImg');
      const counter = document.getElementById('lbCounter');
      const dots = document.getElementById('lbDots');
      if (img) img.src = lightboxPhotos[lightboxIndex];
      if (counter) counter.textContent = `${lightboxIndex + 1} / ${lightboxPhotos.length}`;
      if (dots) {
        dots.innerHTML = lightboxPhotos.map((_, i) => 
          `<button class="lightbox-dot ${i === lightboxIndex ? 'active' : ''}" onclick="event.stopPropagation();lightboxIndex=${i};updateLightbox()"></button>`
        ).join('');
      }
    }
    
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const overlay = document.getElementById('lightboxOverlay');
      if (!overlay || !overlay.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    });
    
    // ═══ RATING DISTRIBUTION GENERATOR ═══
    function generateRatingDist(rating) {
      // Generate realistic distribution based on rating
      const r = Math.round(rating * 10) / 10;
      let dist = [0, 0, 0, 0, 0]; // 1-5 stars
      if (r >= 4.5) { dist = [1, 2, 8, 25, 64]; }
      else if (r >= 4.0) { dist = [2, 4, 12, 32, 50]; }
      else if (r >= 3.5) { dist = [3, 6, 18, 38, 35]; }
      else if (r >= 3.0) { dist = [5, 10, 25, 35, 25]; }
      else { dist = [8, 15, 30, 30, 17]; }
      // Adjust to sum to 100
      const sum = dist.reduce((a, b) => a + b, 0);
      return dist.map(d => Math.round(d / sum * 100));
    }
    
    function renderRatingDist(rating) {
      const dist = generateRatingDist(rating);
      let html = '<div class="modal-rating-dist">';
      for (let i = 5; i >= 1; i--) {
        html += `<div class="rating-dist-row">
          <span class="rating-dist-label">${i}星</span>

          <span class="rating-dist-pct">${dist[i-1]}%</span>
        </div>`;
      }
      html += '</div>';
      return html;
    }

              <div class="star-input" id="starInput">${[1,2,3,4,5].map(i => `<span data-val="${i}">☆</span>`).join('')}</div>
              <textarea class="review-input" id="reviewText" placeholder="分享你的游玩体验…" maxlength="500"></textarea>
              <button class="btn btn-sm btn-primary review-submit" id="submitReview" data-spot="${s.id}">提交评价</button>
            </div>
            ${reviewsHtml}
          </div>
        </div>`;
      openModal(html);
      requestAnimationFrame(() => {
        initGallery();
        // Anchor navigation scroll tracking
        const anchorNav = document.getElementById('modalAnchorNav');
        if (anchorNav) {
          const modalContent = document.querySelector('.modal');
          const anchors = anchorNav.querySelectorAll('a');
          const sections = ['modal-overview','modal-guide','modal-map','modal-reviews'].map(id => document.getElementById(id)).filter(Boolean);
          
          anchors.forEach(a => {
            a.addEventListener('click', e => {
              e.preventDefault();
              const target = document.querySelector(a.getAttribute('href'));
              if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
          });
          
          if (modalContent) {
            modalContent.addEventListener('scroll', () => {
              let current = '';
              sections.forEach(sec => {
                if (sec.getBoundingClientRect().top < 200) current = sec.id;
              });
              anchors.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + current));
            }, { passive: true });
          }
        }
        
        // Floating action bar favorite button
        document.querySelector('.modal-fav-btn')?.addEventListener('click', function() {
          const id = this.dataset.id;
          let currentFavs = getFavs();
          if (currentFavs.includes(id)) {
            currentFavs = currentFavs.filter(f => f !== id);
            localStorage.setItem('jinan-favs', JSON.stringify(currentFavs));
            this.textContent = '♡';
            this.classList.remove('faved');
            showToast('💔 已取消收藏');
          } else {
            currentFavs.push(id);
            localStorage.setItem('jinan-favs', JSON.stringify(currentFavs));
            this.textContent = '♥';
            this.classList.add('faved');
            showToast('❤️ 已收藏');
          }
          updateFavCount();
        });
        
        document.querySelector('.modal-add-trip')?.addEventListener('click', function() {
          addToTrip(this.dataset.id);
          this.textContent='✓ 已加入'; this.classList.remove('btn-primary'); this.classList.add('btn-outline'); this.disabled=true;
        });
        document.querySelector('.modal-share')?.addEventListener('click', function() {
          const name = this.dataset.name;
          if (navigator.share) navigator.share({title:`济南旅游 - ${name}`,text:`推荐你去济南的${name}！`,url:location.href});
          else { navigator.clipboard?.writeText(`推荐你去济南的${name}！${location.href}`); showToast('链接已复制'); }
        });
        // TTS button
        document.querySelector('.tts-btn')?.addEventListener('click', function() {
          speakSpot(s);
        });
        // Star rating input
        let selectedStars = 0;
        document.querySelectorAll('#starInput span').forEach(star => {
          star.addEventListener('click', () => {
            selectedStars = parseInt(star.dataset.val);
            document.querySelectorAll('#starInput span').forEach((s,i) => {
              s.textContent = i < selectedStars ? '★' : '☆';
              s.classList.toggle('active', i < selectedStars);
            });
          });
          star.addEventListener('mouseenter', () => {
            document.querySelectorAll('#starInput span').forEach((s,i) => {
              s.textContent = i < parseInt(star.dataset.val) ? '★' : '☆';
            });
          });
        });
        document.getElementById('starInput')?.addEventListener('mouseleave', () => {
          document.querySelectorAll('#starInput span').forEach((s,i) => {
            s.textContent = i < selectedStars ? '★' : '☆';
          });
        });
        // Submit review
        document.getElementById('submitReview')?.addEventListener('click', function() {
          const spotId = this.dataset.spot;
          const text = document.getElementById('reviewText').value.trim();
          if (!selectedStars) { showToast('请先选择评分'); return; }
          if (!text) { showToast('请写点评价内容'); return; }
          const allReviews = JSON.parse(localStorage.getItem('jinan-reviews') || '{}');
          if (!allReviews[spotId]) allReviews[spotId] = [];
          allReviews[spotId].push({
            name: '我', stars: selectedStars, text: text,
            date: new Date().toISOString().slice(0,10)
          });
          localStorage.setItem('jinan-reviews', JSON.stringify(allReviews));
          showToast('✓ 评价已提交');
          const spot = allSpots.find(x => x.id === spotId);
          if (spot) setTimeout(() => openQuickView(spot), 300);
        });
      });
    };

    // ── Enhanced Map with legend filtering + locate me ──
    let leafletMap = null;
    let mapMarkers = [];
    let mapMarkerGroup = null;

    function initLeafletMap() {
      const container = document.getElementById('map-container');
      if (!container || !allSpots.length) return;
      leafletMap = L.map('map-container').setView([36.67, 117.02], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 18
      }).addTo(leafletMap);

      mapMarkerGroup = L.layerGroup().addTo(leafletMap);
      renderMapMarkers('all');

      // Fit bounds
      const bounds = allSpots.filter(s => s.lat && s.lng).map(s => [s.lat, s.lng]);
      if (bounds.length) leafletMap.fitBounds(bounds, { padding: [30, 30] });
    }

    // Generate offline static SVG map with marker
    function generateStaticMap(lat, lng, name) {
      // Create a simple but attractive SVG map representation
      const gridLines = [];
      for (let i = 0; i < 12; i++) {
        gridLines.push(`<line x1="${i*50}" y1="0" x2="${i*50}" y2="300" stroke="rgba(42,157,143,.08)" stroke-width="1"/>`);
        gridLines.push(`<line x1="0" y1="${i*25}" x2="600" y2="${i*25}" stroke="rgba(42,157,143,.08)" stroke-width="1"/>`);
      }
      // Grid roads
      const roads = [];
      for (let i = 1; i < 6; i++) {
        roads.push(`<line x1="${i*100+20}" y1="0" x2="${i*100+20}" y2="300" stroke="rgba(201,169,110,.15)" stroke-width="2" stroke-dasharray="4,4"/>`);
      }
      for (let i = 1; i < 4; i++) {
        roads.push(`<line x1="0" y1="${i*75+10}" x2="600" y2="${i*75+10}" stroke="rgba(201,169,110,.15)" stroke-width="2" stroke-dasharray="4,4"/>`);
      }
      // Location marker
      const marker = `
        <g transform="translate(300,130)">
          <circle r="24" fill="rgba(239,68,68,.15)" cx="0" cy="0">
            <animate attributeName="r" values="24;32;24" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values=".4;.1;.4" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle r="12" fill="#ef4444" cx="0" cy="0" stroke="#fff" stroke-width="3"/>
          <circle r="4" fill="#fff" cx="0" cy="0"/>
        </g>
        <text x="300" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="var(--text,#111)" font-family="system-ui,sans-serif">${name}</text>
        <text x="300" y="190" text-anchor="middle" font-size="11" fill="var(--text3,#999)" font-family="system-ui,sans-serif">📍 ${lat.toFixed(4)}°N, ${lng.toFixed(4)}°E</text>
      `;
      // Decorative elements (parks, water)
      const decor = `
        <rect x="420" y="40" width="80" height="60" rx="8" fill="rgba(34,197,94,.08)" stroke="rgba(34,197,94,.15)"/>
        <text x="460" y="75" text-anchor="middle" font-size="10" fill="rgba(34,197,94,.4)">🌿 公园</text>
        <rect x="60" y="200" width="120" height="50" rx="8" fill="rgba(59,130,246,.06)" stroke="rgba(59,130,246,.1)"/>
        <text x="120" y="230" text-anchor="middle" font-size="10" fill="rgba(59,130,246,.35)">💧 泉域</text>
      `;
      // Navigation link
      const navLink = `https://uri.amap.com/marker?position=${lng},${lat}&name=${encodeURIComponent(name)}`;
      
      return `<div class="static-map" style="position:relative;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);">
        <svg viewBox="0 0 600 300" width="100%" height="200" xmlns="http://www.w3.org/2000/svg" style="display:block;">
          <defs>
            <radialGradient id="mapBg" cx="50%" cy="40%">
              <stop offset="0%" stop-color="rgba(42,157,143,.04)"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
          </defs>
          <rect fill="url(#mapBg)" width="600" height="300"/>
          ${gridLines.join('')}
          ${roads.join('')}
          ${decor}
          ${marker}
        </svg>
        <a href="${navLink}" target="_blank" rel="noopener" style="position:absolute;bottom:10px;right:10px;padding:6px 14px;background:var(--accent);color:#fff;border-radius:100px;font-size:.75rem;font-weight:600;text-decoration:none;box-shadow:0 2px 8px rgba(201,169,110,.3);transition:all .25s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">🗺️ 导航去这里</a>
      </div>`;
    }
    function getMapPopupImg(s) {
      const imgSrc = s.img || '';
      const name = s.name || '济南';
      const colors = [['#c9a96e','#e8dcc8'],['#2a9d8f','#d4f1ed'],['#e76f51','#fce4de'],['#8b5cf6','#ede9fe'],['#3b82f6','#dbeafe']];
      const ci = Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0)) % colors.length;
      const [bg,fg] = colors[ci];
      const fb = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="220" height="100"><rect fill="' + bg + '" width="220" height="100"/><text x="110" y="45" text-anchor="middle" font-size="24">🏔️</text><text x="110" y="70" text-anchor="middle" fill="' + fg + '" font-size="11" font-family="sans-serif">' + name + '</text></svg>');
      return '<img class="map-popup-img" src="' + imgSrc + '" alt="' + name + '" onerror="this.onerror=null;this.src=\'' + fb + '\'" loading="lazy">';
    }

    function renderMapMarkers(filterCat) {
      if (!mapMarkerGroup || !leafletMap) return;
      mapMarkerGroup.clearLayers();
      const filtered = filterCat === 'all' ? allSpots : allSpots.filter(s => s.cat === filterCat);
      filtered.forEach(s => {
        if (!s.lat || !s.lng) return;
        const color = catColors[s.cat] || '#c9a96e';
        const icon = L.divIcon({
          className: 'leaflet-div-icon custom-marker',
          html: `<div style="background:${color};color:#fff;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer;border:2px solid #fff;transition:transform .2s">${s.name}</div>`,
          iconSize: [0, 0],
          iconAnchor: [0, 0]
        });
        const marker = L.marker([s.lat, s.lng], { icon });
        const ratingStars = '★'.repeat(Math.floor(s.rating)) + '☆'.repeat(5 - Math.floor(s.rating));
        const priceStr = s.price === 0 ? '<span style="color:#22c55e;font-weight:600">免费</span>' : '¥' + s.price;
        const popupHtml = '<div class="map-popup-container">' +
          getMapPopupImg(s) +
          '<div class="map-popup-body">' +
            '<div class="map-popup-name">' + s.name + '</div>' +
            '<div class="map-popup-meta">' +
              '<span class="map-popup-rating">' + ratingStars + ' ' + s.rating + '</span>' +
              '<span>·</span>' +
              '<span>' + priceStr + '</span>' +
              '<span>·</span>' +
              '<span>⏱' + s.dur + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
        marker.bindPopup(popupHtml, { maxWidth: 240, closeButton: true });
        marker.on('click', () => { highlightCard(s.id); });
        mapMarkerGroup.addLayer(marker);
      });
    }

    function highlightCard(spotId) {
      document.querySelectorAll('.card.highlighted').forEach(c => c.classList.remove('highlighted'));
      const card = document.querySelector('.card[data-id="' + spotId + '"]');
      if (card) {
        card.classList.add('highlighted');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => card.classList.remove('highlighted'), 3000);
      }
    }

    // Map legend filter buttons - sync with main filter
    document.querySelectorAll('.map-legend-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.map-legend-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.dataset.mapCat;
        renderMapMarkers(cat);
        if (cat !== 'all') {
          activeCat = cat;
          document.querySelectorAll('#catFilters .filter-btn').forEach(b => b.classList.remove('active'));
          const catBtn = document.querySelector('#catFilters .filter-btn[data-cat="' + cat + '"]');
          if (catBtn) catBtn.classList.add('active');
          render();
        }
      });
    });

    // Locate me button
    document.getElementById('locateMeBtn')?.addEventListener('click', () => {
      if (!navigator.geolocation) { showToast('浏览器不支持定位'); return; }
      showToast('正在定位…');
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        if (leafletMap) {
          leafletMap.setView([latitude, longitude], 15);
          L.marker([latitude, longitude], {
            icon: L.divIcon({
              className: 'leaflet-div-icon custom-marker',
              html: '<div style="background:#ef4444;color:#fff;padding:6px 12px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);border:3px solid #fff">📍 我的位置</div>',
              iconSize: [0, 0],
              iconAnchor: [0, 0]
            })
          }).addTo(leafletMap);
          showToast('✓ 已定位到您的位置');
        }
      }, err => {
        showToast('定位失败：' + (err.message || '请检查权限'));
      }, { enableHighAccuracy: true, timeout: 10000 });
    });


    // ── Filter Collapse Toggle ──
    const moreFiltersBtn = document.getElementById('moreFiltersBtn');
    const collapsibleFilters = document.getElementById('collapsibleFilters');
    const filterActiveBadge = document.getElementById('filterActiveBadge');

    function countActiveFilters() {
      let count = 0;
      if (activeAud !== 'all') count++;
      if (activeArea !== 'all') count++;
      if (activeTicket !== 'all') count++;
      if (activeDur !== 'all') count++;
      return count;
    }

    function updateFilterBadge() {
      const count = countActiveFilters();
      if (count > 0) {
        filterActiveBadge.style.display = 'inline-flex';
        filterActiveBadge.textContent = count;
      } else {
        filterActiveBadge.style.display = 'none';
      }
    }

    moreFiltersBtn?.addEventListener('click', () => {
      const isExpanded = collapsibleFilters.classList.toggle('expanded');
      moreFiltersBtn.classList.toggle('active', isExpanded);
      moreFiltersBtn.setAttribute('aria-expanded', isExpanded);
      const arrow = moreFiltersBtn.querySelector('.arrow');
      if (arrow) arrow.textContent = isExpanded ? '▲' : '▼';
    });

    ['audienceFilters','areaFilters','ticketFilters','durationFilters'].forEach(id => {
      document.getElementById(id)?.addEventListener('click', () => {
        setTimeout(updateFilterBadge, 10);
      });
    });

    
    // Load Leaflet JS
    const leafletScript = document.createElement('script');
    leafletScript.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    leafletScript.onload = () => {
      const tryInit = () => {
        if (allSpots.length) { initLeafletMap(); renderRecommend(); }
        else setTimeout(tryInit, 200);
      };
      tryInit();
      // Pre-load voices for TTS
      if ('speechSynthesis' in window) speechSynthesis.getVoices();
    };
    document.head.appendChild(leafletScript);
  
    // ═══ SHOPIFY-STYLE: 数字计数动画 ═══
    function animateCount(elId, target) {
      const el = document.getElementById(elId);
      if (!el) return;
      const current = parseInt(el.textContent) || 0;
      if (current === target) return;
      const duration = 400;
      const start = performance.now();
      const startVal = current;
      el.style.opacity = '0';
      el.style.transform = 'translateY(10px)';
      requestAnimationFrame(function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        const val = Math.round(startVal + (target - startVal) * eased);
        el.innerHTML = '共 <strong>' + val + '</strong> 个景点';
        el.style.opacity = String(0.3 + 0.7 * eased);
        el.style.transform = 'translateY(' + (10 * (1 - eased)) + 'px)';
        if (progress < 1) requestAnimationFrame(tick);
        else { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }
      });
    }

    // ═══ SHOPIFY-STYLE: 交错入场 IntersectionObserver ═══
    function initRevealObserver() {
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry, index) {
          if (entry.isIntersecting) {
            const el = entry.target;
            const delay = parseInt(el.dataset.staggerIndex || 0) * 60;
            setTimeout(function() {
              el.classList.add('revealed');
              el.classList.add('stagger-in');
            }, delay);
            observer.unobserve(el);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.rv:not(.revealed)').forEach(function(el, i) {
        el.dataset.staggerIndex = i;
        observer.observe(el);
      });
    }
</script>
