  <meta name="theme-color" content="#c9a96e">

  <style>
    .filter-section{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;margin-bottom:20px}
    .filter-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .filter-group-label{font-size:.8rem;font-weight:700;color:var(--text);letter-spacing:.06em;margin-right:8px;white-space:nowrap;display:flex;align-items:center;gap:4px}
    .sort-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
    .sort-wrap label{font-size:.75rem;color:var(--text3);white-space:nowrap}
    .sort-select{padding:6px 14px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.75rem;color:var(--text2);cursor:pointer;outline:none;transition:all .3s}
    .sort-select:hover{border-color:var(--accent)}
    .spot-badge{position:absolute;top:12px;left:12px;z-index:2}
    .spot-price{position:absolute;top:12px;right:12px;z-index:2;background:rgba(0,0,0,.6);color:#fff;padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:600;backdrop-filter:blur(4px)}
    .spot-price .free-tag{color:#5eead4}
    .card-body .card-stars{color:#f59e0b;font-size:.75rem;letter-spacing:1px}
    .card-actions{display:flex;gap:8px;margin-top:auto;padding-top:12px}
    .card-actions .btn{flex:1;justify-content:center}
    .count-badge{font-size:.75rem;color:var(--text3);font-weight:500}
    .count-badge strong{color:var(--text);font-weight:700;font-size:.85rem}
    .empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
    .empty-state .emoji{font-size:3rem;margin-bottom:12px}
    #map-container{width:100%;height:400px;border-radius:var(--radius-lg);overflow:hidden}
    .custom-marker{background:none!important;border:none!important}
    .leaflet-div-icon{background:none!important;border:none!important}
    .map-legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:12px;font-size:.75rem;color:var(--text2)}
    .map-legend span{display:flex;align-items:center;gap:4px}
    .audience-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
    .audience-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;color:var(--text3)}
    .audience-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.1)}
    .audience-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.25)}
    .modal-gallery{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000}
    .gallery-track{display:flex;transition:transform .4s cubic-bezier(.25,.46,.45,.94);height:100%}
    .gallery-slide{flex:0 0 100%;height:100%}
    .gallery-slide img{width:100%;height:100%;object-fit:cover}
    .gallery-btn{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;z-index:3;transition:all .2s;backdrop-filter:blur(4px)}
    .gallery-btn:hover{background:rgba(0,0,0,.8)}
    .gallery-btn.prev{left:12px}
    .gallery-btn.next{right:12px}
    .gallery-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:3}
    .gallery-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);border:none;cursor:pointer;transition:all .3s}
    .gallery-dot.active{background:#fff;width:20px;border-radius:4px}
    .gallery-counter{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.6);color:#fff;padding:4px 10px;border-radius:100px;font-size:.7rem;font-weight:600;z-index:3;backdrop-filter:blur(4px)}
    .modal-map{width:100%;height:140px;border-radius:10px;overflow:hidden;margin-bottom:16px;position:relative;background:var(--bg3)}
    .modal-map iframe{width:100%;height:100%;border:none}
    /* ── 今日推荐 ── */
    .recommend-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:var(--radius-lg);padding:24px 28px;color:#fff;position:relative;overflow:hidden;margin-bottom:24px}
    .recommend-card::before{content:'';position:absolute;top:-30%;right:-10%;width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%}
    .recommend-card .rec-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;opacity:.8;margin-bottom:8px}
    .recommend-card h3{font-size:1.25rem;margin-bottom:6px}
    .recommend-card p{font-size:.85rem;opacity:.9;line-height:1.5}
    .recommend-card .rec-meta{display:flex;gap:16px;margin-top:12px;font-size:.8rem;opacity:.85;flex-wrap:wrap}
    .recommend-card .rec-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:8px 20px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:100px;color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .3s;backdrop-filter:blur(4px)}
    .recommend-card .rec-btn:hover{background:rgba(255,255,255,.35)}
    .rec-season-tag{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.18);padding:4px 12px;border-radius:100px;font-size:.7rem;font-weight:600;backdrop-filter:blur(4px)}
    /* ── 收藏筛选 ── */
    .fav-filter-btn{padding:6px 14px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.75rem;cursor:pointer;transition:all .3s;color:var(--text3);display:flex;align-items:center;gap:4px}
    .fav-filter-btn:hover,.fav-filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.08)}
    .fav-filter-btn .fav-count{background:var(--accent);color:#fff;font-size:.65rem;padding:1px 6px;border-radius:100px;font-weight:700}
    /* ── 卡片收藏/对比按钮 ── */
    .spot-card-actions{position:absolute;top:12px;right:12px;z-index:3;display:flex;gap:6px}
    .card-fav-btn,.card-compare-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .25s;backdrop-filter:blur(4px);background:rgba(0,0,0,.45);color:#fff}
    .card-fav-btn:hover{background:rgba(239,68,68,.8);transform:scale(1.1)}
    .card-fav-btn.faved{background:#ef4444;color:#fff}
    .card-compare-btn:hover{background:rgba(59,130,246,.8);transform:scale(1.1)}
    .card-compare-btn.compared{background:#3b82f6;color:#fff}
    .card-quickview-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .25s;backdrop-filter:blur(4px);background:rgba(0,0,0,.45);color:#fff}
    .card-quickview-btn:hover{background:rgba(42,157,143,.8);transform:scale(1.1)}
    /* ── 时长筛选 ── */
    .duration-filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
    .duration-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;color:var(--text3)}
    .duration-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.1)}
    .duration-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.25)}
    /* ── 对比面板 ── */
    .compare-bar{position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--bg);border-top:2px solid var(--accent);box-shadow:0 -4px 24px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .35s var(--ease-out);padding:16px 24px;max-height:50vh;overflow-y:auto}
    .compare-bar.open{transform:translateY(0)}
    .compare-bar .compare-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .compare-bar .compare-header h4{font-size:1rem;font-weight:700;margin:0}
    .compare-bar .compare-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text3);padding:4px}
    .compare-table{width:100%;border-collapse:collapse;font-size:.8rem}
    .compare-table th{text-align:left;padding:8px 12px;background:var(--bg2);color:var(--text3);font-weight:600;white-space:nowrap;width:100px;vertical-align:top}
    .compare-table td{padding:8px 12px;border-bottom:1px solid var(--border2);vertical-align:top}
    .compare-table .compare-name{font-weight:700;font-size:.9rem;color:var(--text)}
    .compare-table .compare-remove{color:#ef4444;cursor:pointer;font-size:.75rem;margin-left:4px}
    .compare-open-btn{position:fixed;bottom:20px;right:20px;z-index:350;padding:10px 20px;border-radius:100px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.35);transition:all .3s;display:none;align-items:center;gap:6px}
    .compare-open-btn.show{display:flex}
    .compare-open-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,130,246,.45)}
    /* ── 地图增强 ── */
    .map-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
    .map-legend-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:4px;color:var(--text3)}
    .map-legend-btn:hover,.map-legend-btn.active{border-color:var(--accent);color:var(--accent)}
    .map-legend-btn .legend-dot{width:8px;height:8px;border-radius:50%}
    .locate-btn{padding:6px 14px;border:1px solid var(--teal);background:rgba(42,157,143,.08);border-radius:100px;font-size:.75rem;cursor:pointer;color:var(--teal);font-weight:600;transition:all .3s;display:flex;align-items:center;gap:4px}
    .locate-btn:hover{background:var(--teal);color:#fff}
    /* ── 语音导览 ── */
    .tts-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid var(--accent);background:rgba(42,157,143,.06);border-radius:100px;font-size:.85rem;cursor:pointer;color:var(--accent);font-weight:600;transition:all .3s}
    .tts-btn:hover{background:var(--accent);color:#fff}
    .tts-btn.playing{background:var(--accent);color:#fff;animation:pulse-tts 1.5s infinite}
    @keyframes pulse-tts{0%,100%{box-shadow:0 0 0 0 rgba(42,157,143,.4)}50%{box-shadow:0 0 0 8px rgba(42,157,143,0)}}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 24px;border-radius:100px;font-size:.85rem;font-weight:500;z-index:500;opacity:0;transition:all .3s var(--ease-out);pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .review-form{background:var(--bg2);border-radius:12px;padding:16px;margin-bottom:16px}
    .review-form h5{font-size:.85rem;font-weight:700;margin-bottom:12px}
    .star-input{display:flex;gap:4px;margin-bottom:10px}
    .star-input span{font-size:1.4rem;cursor:pointer;color:var(--text3);transition:color .2s}
    .star-input span.active,.star-input span:hover{color:#f59e0b}
    .review-input{width:100%;padding:10px 14px;border:1px solid var(--border2);background:var(--bg);border-radius:10px;font-size:.85rem;font-family:var(--sans);resize:vertical;min-height:60px;outline:none;transition:border-color .3s}
    .review-input:focus{border-color:var(--accent)}
    .review-submit{margin-top:10px}
    .user-review{border-left:3px solid var(--accent);padding-left:12px}
    @media(max-width:768px){
      .filter-container{padding:16px}
      .filter-section{flex-direction:column;gap:12px}
      .sort-wrap{margin-left:0}
      .audience-bar{padding-left:0}
      .modal{max-height:92vh;border-radius:var(--radius) var(--radius) 0 0}
      .modal-gallery{aspect-ratio:4/3}
      .area-filter-row,.ticket-filter-row{flex-wrap:wrap}
    }
    /* ── 筛选容器 ── */
    .filter-container{background:var(--bg2);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px;border:1px solid var(--border2)}
    .filter-container .filter-section{margin-bottom:12px}
    .filter-container .audience-bar,
    .filter-container .area-filter-row,
    .filter-container .ticket-filter-row{margin-bottom:10px}
    .reset-filters-btn{padding:6px 14px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.75rem;cursor:pointer;transition:all .3s;color:var(--text3);display:flex;align-items:center;gap:4px;white-space:nowrap}
    .reset-filters-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.08)}
    .filter-bottom-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    /* ── 区域筛选 ── */
    .area-filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
    .area-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;color:var(--text3)}
    .area-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.1)}
    .area-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.25)}
    /* ── 门票筛选 ── */
    .ticket-filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
    .ticket-btn{padding:4px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:100px;font-size:.7rem;cursor:pointer;transition:all .3s;color:var(--text3)}
    .ticket-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.1)}
    .ticket-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,.25)}
    /* ── 当季推荐标签 ── */
    .seasonal-rec-tag{position:absolute;bottom:12px;left:12px;z-index:2;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;padding:3px 10px;border-radius:100px;font-size:.65rem;font-weight:600;backdrop-filter:blur(4px);pointer-events:none}
    /* ── 拥挤度指示器 ── */
    .crowd-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:middle}
    .crowd-low{background:#22c55e}
    .crowd-medium{background:#f59e0b}
    .crowd-high{background:#ef4444}
    /* ── 区域标签 ── */
    .area-label{font-size:.65rem;padding:2px 8px;background:rgba(42,157,143,.08);color:var(--teal);border-radius:100px;display:inline-flex;align-items:center;gap:3px}
    /* ── 拍照攻略 ── */
    .modal-photo-guide { background: var(--bg2); border-radius: 12px; padding: 16px; margin: 16px 0; }
    .modal-photo-guide h4 { font-size: .9rem; margin-bottom: 8px; }
    .modal-photo-guide .best-photo { font-size: .85rem; color: var(--text2); line-height: 1.6; }
    .modal-photo-guide .photo-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .modal-photo-guide .photo-tag-sm { padding: 4px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 100px; font-size: .75rem; color: var(--text2); }
    /* ── 周边联游 ── */
    .modal-nearby { background: var(--bg2); border-radius: 12px; padding: 16px; margin: 16px 0; }
    .modal-nearby h4 { font-size: .9rem; margin-bottom: 8px; }
    .modal-nearby-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-nearby-item { padding: 6px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 100px; font-size: .8rem; cursor: pointer; transition: all .3s; }
    .modal-nearby-item:hover { border-color: var(--accent); color: var(--accent); }
    /* ── 实用贴士 ── */
    .modal-tips { background: linear-gradient(135deg, rgba(42,157,143,.08), rgba(201,169,110,.08)); border-radius: 12px; padding: 16px; margin: 16px 0; border-left: 3px solid var(--teal); }
    .modal-tips h4 { font-size: .9rem; margin-bottom: 8px; }
    .modal-tips p { font-size: .85rem; color: var(--text2); line-height: 1.6; }
    /* ── 景点标签 ── */
    .modal-tags-section { background: var(--bg2); border-radius: 12px; padding: 16px; margin: 16px 0; }
    .modal-tags-section h4 { font-size: .9rem; margin-bottom: 10px; }
    .modal-tags-list { display: flex; gap: 6px; flex-wrap: wrap; }

  <script type="module">
    import { initAll, stars, openModal, closeModal } from '/src/components/shared.js';
    import { initPWA } from '/src/components/pwa.js';
    import { Favorites, CompareTool, SmartSearch, AccessibilityTools, OfflineManager } from '/src/components/interactive.js';
    import { initShopifyAnimations } from '/src/components/shopify-animations.js';

    // ── Interactive: Favorites + Compare + A11y ──
    const favs = new Favorites();
    const compare = new CompareTool();
    favs._updateBadge();
    const a11y = new AccessibilityTools();
    const toolbarEl = document.createElement('div');
    toolbarEl.innerHTML = a11y.renderToolbar();
    document.body.appendChild(toolbarEl);
    a11y.bindToolbar();
    const offline = new OfflineManager();
    offline.cacheEssentials();

    // Image fallback: generate colorful SVG by name
    window.imgFallback = function(name) {
      const colors = [['#c9a96e','#e8dcc8'],['#2a9d8f','#d4f1ed'],['#e76f51','#fce4de'],['#8b5cf6','#ede9fe'],['#3b82f6','#dbeafe'],['#f59e0b','#fef3c7']];
      const ci = Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0)) % colors.length;
      const [bg,fg] = colors[ci];
      return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400"><rect fill="${bg}" width="600" height="400" rx="12"/><text x="300" y="180" text-anchor="middle" font-size="50">🏔️</text><text x="300" y="250" text-anchor="middle" fill="${fg}" font-size="22" font-family="sans-serif" font-weight="bold">${name}</text><text x="300" y="285" text-anchor="middle" fill="${fg}" font-size="13" font-family="sans-serif" opacity="0.6">济南旅游攻略</text></svg>`)}`;
    };

    import { initSocialFeatures } from '/src/components/social.js';
    initPWA();

    const badgeLabels = { hot: '🔥 热门', must: '⭐ 必去', hidden: '🌿 小众', free: '🆓 免费', kid: '👶 亲子', night: '🌙 夜游', new: '🆕 新增' };
    const catColors = { spring: '#3b82f6', nature: '#22c55e', history: '#a855f7', food: '#f59e0b', landmark: '#ec4899', culture: '#8b5cf6', family: '#14b8a6', amusement: '#f97316' };
    const audienceLabels = { family: '亲子', couple: '情侣', elder: '老人', solo: '独行' };

    // ── CPS Affiliate Config ──
    // 替换为你自己的联盟 ID
    const CPS = {
      ctrip: {
        baseUrl: 'https://m.ctrip.com/webapp/you/article/searchresult.html',
        affId: 'YOUR_CTRIP_AFF_ID',  // 携程联盟 ID
        subId: 'jinan-guide'
      },
      meituan: {
        baseUrl: 'https://i.meituan.com/s/',
        affId: 'YOUR_MEITUAN_AFF_ID'  // 美团联盟 ID
      }
    };

    function getCtripLink(spotName) {
      return `${CPS.ctrip.baseUrl}?keyword=${encodeURIComponent(spotName + ' 门票')}&allianceid=${CPS.ctrip.affId}&sid=${CPS.ctrip.subId}`;
    }
    function getMeituanLink(spotName) {
      return `${CPS.meituan.baseUrl}${encodeURIComponent(spotName)}?ci=111&f=${CPS.meituan.affId}`;
    }
    let allSpots = [], activeCat = 'all', activeAud = 'all', activeArea = 'all', activeTicket = 'all', activeDur = 'all', sortBy = 'recommend', currentGalleryIndex = 0;

    // ── 解析时长字符串为分钟 ──
    function parseDurMinutes(dur) {
      if (!dur) return 60;
      dur = dur.toLowerCase();
      // "半天" → 240, "全天" → 480
      if (dur.includes('全天')) return 480;
      if (dur.includes('半天')) return 240;
      // "2-3小时" → 180, "1.5小时" → 90
      const hMatch = dur.match(/([\d.]+)\s*[~\-到至]\s*([\d.]+)\s*小时/);
      if (hMatch) return parseFloat(hMatch[2]) * 60;
      const hSingle = dur.match(/([\d.]+)\s*小时/);
      if (hSingle) return parseFloat(hSingle[1]) * 60;
      // "30分钟" → 30
      const mMatch = dur.match(/([\d]+)\s*分钟/);
      if (mMatch) return parseInt(mMatch[1]);
      return 60;
    }

    // ── 区域分类（基于经纬度） ──
    function getArea(spot) {
      if (!spot.lat || !spot.lng) return '其他';
      if (spot.lng < 116.98) return '槐荫区';
      if (spot.lng > 117.06) return '历城区';
      if (spot.lat > 36.68 && spot.lng < 117.02) return '天桥区';
      if (spot.lat < 36.64) return '市中区';
      return '历下区';
    }

    // ── 当季推荐判断 ──
    function isSeasonalRecommended(spot) {
      const month = new Date().getMonth() + 1;
      const best = (spot.bestTime || '').toLowerCase();
      const desc = (spot.desc || '').toLowerCase();
      if (month >= 3 && month <= 5 && (best.includes('春') || best.includes('4月') || best.includes('5月') || best.includes('樱花'))) return true;
      if (month >= 6 && month <= 8 && (best.includes('夏') || best.includes('避暑') || desc.includes('清凉'))) return true;
      if (month >= 9 && month <= 11 && (best.includes('秋') || best.includes('红叶') || best.includes('秋色'))) return true;
      if ((month >= 12 || month <= 2) && (best.includes('冬') || best.includes('雾气') || desc.includes('仙境'))) return true;
      return false;
    }

    // ── 拥挤度分类 ──
    function getCrowdLevel(spot) {
      const c = (spot.crowd || '').toLowerCase();
      if (c.includes('爆满') || c.includes('人山人海') || c.includes('很多')) return 'high';
      if (c.includes('人少') || c.includes('清净') || c.includes('不多') || c.includes('私藏')) return 'low';
      return 'medium';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function loadSpots() {
      try {
        const res = await fetch('/jinan-travel-guide/data/spots.json');
        allSpots = await res.json();
        render();
      } catch (e) {
        console.error('加载景点数据失败:', e);
        document.getElementById('spotGrid').innerHTML = '<div class="empty-state"><div class="emoji">😢</div><p>数据加载失败</p></div>';
      }
    }

    function getFiltered() {
      let list = [...allSpots];
      if (activeCat !== 'all') list = list.filter(s => s.cat === activeCat);
      if (activeAud !== 'all') list = list.filter(s => s.audience.includes(activeAud));
      if (activeArea !== 'all') list = list.filter(s => getArea(s) === activeArea);
      if (activeTicket === 'free') list = list.filter(s => s.price === 0);
      else if (activeTicket === 'paid') list = list.filter(s => s.price > 0);
      else if (activeTicket === 'under50') list = list.filter(s => s.price > 0 && s.price < 50);
      else if (activeTicket === '50to100') list = list.filter(s => s.price >= 50 && s.price <= 100);
      else if (activeTicket === 'over100') list = list.filter(s => s.price > 100);
      // Duration filter
      if (activeDur !== 'all') {
        list = list.filter(s => {
          const dur = (s.dur || '').toLowerCase();
          const mins = parseDurMinutes(dur);
          if (activeDur === '1h') return mins <= 60;
          if (activeDur === '1to3') return mins > 60 && mins <= 180;
          if (activeDur === 'half') return mins > 120 && mins <= 300;
          if (activeDur === 'full') return mins > 300;
          return true;
        });
      }
      switch (sortBy) {
        case 'rating': list.sort((a, b) => b.rating - a.rating); break;
        case 'price': list.sort((a, b) => a.price - b.price); break;
        case 'reviews': list.sort((a, b) => b.reviews - a.reviews); break;
      }
      return list;
    }

    function render() {
      const list = getFiltered();
      const grid = document.getElementById('spotGrid');
      const empty = document.getElementById('emptyState');
      animateCount('spotCount', list.length);
      const itineraries = JSON.parse(localStorage.getItem('jinan-itinerary') || '[]');

      if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      grid.innerHTML = list.map(s => {
        const inIt = itineraries.includes(s.id);
        const isFav = favs.isFavorite(s.id);
        const inCompare = compare.has(s.id);
        const priceHtml = s.price === 0 ? '<span class="free-tag">免费</span>' : `¥${s.price}`;
        return `
          <article class="card rv" data-id="${s.id}">
            <div class="card-img">
              <img src="${s.img}" alt="${s.name}" loading="lazy" onerror="this.onerror=null;this.src=imgFallback(this.alt);this.parentElement.classList.add('img-loaded')">
              <span class="spot-badge badge ${s.badge}">${badgeLabels[s.badge] || s.badge}</span>
              <span class="spot-price">${priceHtml}</span>
              <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${s.id}" aria-label="${isFav ? '取消收藏' : '收藏'}" onclick="event.stopPropagation();window._toggleFav('${s.id}',this)">${isFav ? '♥' : '♡'}</button>
              <button class="compare-btn ${inCompare ? 'active' : ''}" data-id="${s.id}" aria-label="${inCompare ? '取消对比' : '加入对比'}" onclick="event.stopPropagation();window._toggleCompare('${s.id}',this)">${inCompare ? '✓' : '⚖️'}</button>
            </div>
            <div class="card-body">
              <h3>${s.name} <span class="card-stars">${stars(s.rating)}</span></h3>
              <p class="desc">${s.desc}</p>

      document.querySelectorAll('.detail-btn').forEach(btn => {

    // ── Favorites & Compare toggles ──
    window._toggleFav = function(id, btn) {
      const isFav = favs.toggle(id);
      btn.classList.toggle('active', isFav);
      btn.innerHTML = isFav ? '♥' : '♡';
      btn.setAttribute('aria-label', isFav ? '取消收藏' : '收藏');
    };
    window._toggleCompare = function(id, btn) {
      const spot = allSpots.find(s => s.id === id);
      if (!spot) return;
      if (compare.has(id)) {
        compare.remove(id);
        btn.classList.remove('active');

        btn.setAttribute('aria-label', '加入对比');
      } else {

    function addToTrip(id) {
      const list = JSON.parse(localStorage.getItem('jinan-itinerary') || '[]');

    function galleryHtml(s) {
      const imgs = [s.img];
      return `
        <div class="modal-gallery" data-count="${imgs.length}">
          <div class="gallery-track">${imgs.map((img,i) => `<div class="gallery-slide"><img src="${img}" alt="${s.name}" loading="lazy"></div>`).join('')}</div>
          ${imgs.length > 1 ? `<button class="gallery-btn prev" aria-label="上一张">‹</button><button class="gallery-btn next" aria-label="下一张">›</button><div class="gallery-dots">${imgs.map((_,i) => `<button class="gallery-dot ${i===0?'active':''}" data-index="${i}"></button>`).join('')}</div><span class="gallery-counter">1 / ${imgs.length}</span>` : ''}
        </div>`;
    }

    function initGallery() {
      const gallery = document.querySelector('.modal-gallery');
      if (!gallery) return;
      const track = gallery.querySelector('.gallery-track');
      const counter = gallery.querySelector('.gallery-counter');
      const dots = gallery.querySelectorAll('.gallery-dot');
      const total = parseInt(gallery.dataset.count);
      currentGalleryIndex = 0;
      function goTo(i) {
        if (i < 0 || i >= total) return;
        currentGalleryIndex = i;
        track.style.transform = `translateX(-${i*100}%)`;
        if (counter) counter.textContent = `${i+1} / ${total}`;
        dots.forEach((d,idx) => d.classList.toggle('active', idx===i));
      }
      gallery.querySelector('.prev')?.addEventListener('click', e => { e.stopPropagation(); goTo(currentGalleryIndex-1); });
      gallery.querySelector('.next')?.addEventListener('click', e => { e.stopPropagation(); goTo(currentGalleryIndex+1); });
      dots.forEach(d => d.addEventListener('click', e => { e.stopPropagation(); goTo(parseInt(d.dataset.index)); }));
      document.addEventListener('keydown', e => { if(e.key==='ArrowLeft') goTo(currentGalleryIndex-1); if(e.key==='ArrowRight') goTo(currentGalleryIndex+1); });
      let startX=0, moved=false;
      gallery.addEventListener('touchstart', e => { startX=e.touches[0].clientX; moved=false; }, {passive:true});
      gallery.addEventListener('touchmove', () => { moved=true; }, {passive:true});
      gallery.addEventListener('touchend', e => { if(!moved) return; const diff=startX-e.changedTouches[0].clientX; if(Math.abs(diff)>50) goTo(currentGalleryIndex+(diff>0?1:-1)); });
    }

      const defaultReviews = [

      const totalReviews = s.reviews + spotUserReviews.length;

      const html = `
        ${galleryHtml(s)}

          <p class="modal-desc">${s.desc}</p>
          ${photosHtml ? `<div class="modal-photos">${photosHtml}</div>` : ''}
          <div class="modal-info-grid">
            <div class="modal-info-item"><div class="label">🎫 门票</div><div class="value">${priceHtml}</div></div>
            <div class="modal-info-item"><div class="label">⏱ 建议时长</div><div class="value">${s.dur}</div></div>
            <div class="modal-info-item"><div class="label">🕐 开放时间</div><div class="value">${s.open||'全天'}</div></div>
            <div class="modal-info-item"><div class="label">📅 最佳时间</div><div class="value">${s.bestTime||'全年'}</div></div>
            <div class="modal-info-item"><div class="label">👥 拥挤程度</div><div class="value">${s.crowd||'一般'}</div></div>
            <div class="modal-info-item"><div class="label">🎫 预约方式</div><div class="value">${s.book||'无需预约'}</div></div>
            <div class="modal-info-item"><div class="label">🚌 交通</div><div class="value">${s.transport||'—'}</div></div>
            <div class="modal-info-item"><div class="label">💰 优惠政策</div><div class="value">${s.discount||'无'}</div></div>
          </div>
          ${comboHtml}
          ${mapHtml}
          <div class="card-tags" style="margin-bottom:16px">
            ${(s.audience||[]).map(a => `<span class="tag">${audienceLabels[a]||a}</span>`).join('')}
            <span class="tag" style="background:rgba(42,157,143,.1);color:var(--teal)">✓ ${s.trust}</span>
          </div>
          <div class="modal-actions" style="flex-wrap:wrap;gap:10px">
            <button class="btn btn-primary modal-add-trip" data-id="${s.id}" style="flex:1;min-width:120px">＋ 加入行程</button>
            <a href="${getCtripLink(s.name)}" target="_blank" rel="noopener" class="btn btn-outline" style="flex:1;min-width:120px;background:linear-gradient(135deg,#2681ff 0%,#1a6dff 100%);color:#fff;border:none">🐬 携程订票</a>
            <a href="${getMeituanLink(s.name)}" target="_blank" rel="noopener" class="btn btn-outline" style="flex:1;min-width:120px;background:linear-gradient(135deg,#ffc107 0%,#ff9800 100%);color:#fff;border:none">🟡 美团预订</a>
            <button class="btn btn-outline modal-share" data-name="${s.name}" style="flex:0 0 auto">📤 分享</button>
          </div>
          <p style="font-size:.7rem;color:var(--text3);text-align:center;margin-top:8px">通过以上链接预订，本站可获得少量佣金，不影响你的价格 ❤️</p>
          <div class="modal-reviews">
            <h4>💬 游客评价 <span style="font-weight:400;font-size:.8rem;color:var(--text3)">(${totalReviews}条)</span></h4>
            <div class="review-form">
              <h5>✍️ 写评价</h5>
              <div class="star-input" id="starInput">${[1,2,3,4,5].map(i => `<span data-val="${i}">☆</span>`).join('')}</div>
              <textarea class="review-input" id="reviewText" placeholder="分享你的游玩体验…" maxlength="500"></textarea>

            ${reviewsHtml}
          </div>
        </div>`;
      openModal(html);
      requestAnimationFrame(() => {
        initGallery();
        document.querySelector('.modal-add-trip')?.addEventListener('click', function() {
          addToTrip(this.dataset.id);
          this.textContent='✓ 已加入'; this.classList.remove('btn-primary'); this.classList.add('btn-outline'); this.disabled=true;
        });
        document.querySelector('.modal-share')?.addEventListener('click', function() {
          const name = this.dataset.name;
          if (navigator.share) navigator.share({title:`济南旅游 - ${name}`,text:`推荐你去济南的${name}！`,url:location.href});
          else { navigator.clipboard?.writeText(`推荐你去济南的${name}！${location.href}`); showToast('链接已复制'); }

        // Star rating input

            document.querySelectorAll('#starInput span').forEach((s,i) => {
              s.textContent = i < selectedStars ? '★' : '☆';
              s.classList.toggle('active', i < selectedStars);
            });
          });
          star.addEventListener('mouseenter', () => {
            document.querySelectorAll('#starInput span').forEach((s,i) => {
              s.textContent = i < parseInt(star.dataset.val) ? '★' : '☆';
            });
          });
        });
        document.getElementById('starInput')?.addEventListener('mouseleave', () => {
          document.querySelectorAll('#starInput span').forEach((s,i) => {
            s.textContent = i < selectedStars ? '★' : '☆';
          });

        // Submit review
        document.getElementById('submitReview')?.addEventListener('click', function() {
          const spotId = this.dataset.spot;

          const allReviews = JSON.parse(localStorage.getItem('jinan-reviews') || '{}');

          allReviews[spotId].push({
            name: '我', stars: selectedStars, text: text,

    initAll();
    initShopifyAnimations();
    initSocialFeatures();
    loadSpots().then(() => {
      // Handle URL params: ?id=xxx or ?q=xxx
      const params = new URLSearchParams(location.search);
      const spotId = params.get('id');
      const spotQuery = params.get('q');
      if (spotId) {
        // Scroll to and open specific spot
        setTimeout(() => {
          const card = document.querySelector(`.card[data-id="${spotId}"]`);
          if (card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.style.boxShadow = '0 0 0 3px var(--accent), 0 8px 32px rgba(201,169,110,.3)';
            card.style.transition = 'box-shadow .3s';
            setTimeout(() => {
              card.style.boxShadow = '';
              const s = allSpots.find(x => x.id === spotId);
              if (s) openQuickView(s);
            }, 800);
          }
        }, 500);
      } else if (spotQuery) {
        // Filter spots by search query and re-render
        const ql = spotQuery.toLowerCase();
        const matches = allSpots.filter(s =>
          s.name.toLowerCase().includes(ql) || s.desc.toLowerCase().includes(ql) ||
          s.cat.toLowerCase().includes(ql) || (s.transport && s.transport.toLowerCase().includes(ql))
        );

          setTimeout(() => {
            const card = document.querySelector(`.card[data-id="${matches[0].id}"]`);
            if (card) {
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
              card.style.boxShadow = '0 0 0 3px var(--accent), 0 8px 32px rgba(201,169,110,.3)';
              card.style.transition = 'box-shadow .3s';

    // ═══════════════════════════════════════════

    // ═══════════════════════════════════════════
    function getCompareList() { return JSON.parse(localStorage.getItem('jinan-compare') || '[]'); }
    function toggleCompare(id) {
      let list = getCompareList();
      if (list.includes(id)) {
        list = list.filter(c => c !== id);
        showToast('已移出对比');
      } else {
        if (list.length >= 3) { showToast('最多对比 3 个景点'); return; }
        list.push(id);
        showToast('✓ 已加入对比');
      }
      localStorage.setItem('jinan-compare', JSON.stringify(list));
      updateCompareUI();
      render();
    }
    function updateCompareUI() {
      const list = getCompareList();
      const btn = document.getElementById('compareOpenBtn');
      const countEl = document.getElementById('compareCountBtn');
      if (countEl) countEl.textContent = list.length;
      if (btn) btn.classList.toggle('show', list.length > 0);
    }
    function renderComparePanel() {
      const list = getCompareList();
      const spots = list.map(id => allSpots.find(s => s.id === id)).filter(Boolean);
      const content = document.getElementById('compareContent');
      if (!content) return;
      if (!spots.length) { content.innerHTML = '<p style="text-align:center;color:var(--text3);padding:20px">暂无对比景点</p>'; return; }
      const fields = [
        { label: '景点', key: 'name', render: s => `<span class="compare-name">${s.name}</span><span class="compare-remove" data-id="${s.id}">✕ 移除</span>` },
        { label: '🎫 门票', key: 'price', render: s => s.price === 0 ? '<span style="color:#22c55e">免费</span>' : `¥${s.price}` },
        { label: '⭐ 评分', key: 'rating', render: s => `${s.rating} ${stars(s.rating)}` },
        { label: '⏱ 游玩时长', key: 'dur', render: s => s.dur },
        { label: '👥 适合人群', key: 'audience', render: s => (s.audience||[]).map(a => audienceLabels[a]||a).join('、') },
        { label: '🕐 开放时间', key: 'open', render: s => (s.open||'全天').split('(')[0].trim() },
        { label: '🚌 交通', key: 'transport', render: s => s.transport || '—' }
      ];
      let html = '<table class="compare-table">';
      fields.forEach(f => {
        html += `<tr><th>${f.label}</th>${spots.map(s => `<td>${f.render(s)}</td>`).join('')}</tr>`;
      });
      html += '</table>';
      content.innerHTML = html;
      content.querySelectorAll('.compare-remove').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.id;
          let list = getCompareList().filter(c => c !== id);
          localStorage.setItem('jinan-compare', JSON.stringify(list));
          updateCompareUI();
          renderComparePanel();
          render();
        });
      });

    // ═══════════════════════════════════════════
    //  3. 今日推荐算法
    // ═══════════════════════════════════════════
    function getSeason() {
      const m = new Date().getMonth() + 1;
      if (m >= 3 && m <= 5) return 'spring';
      if (m >= 6 && m <= 8) return 'summer';
      if (m >= 9 && m <= 11) return 'autumn';
      return 'winter';
    }
    function getSeasonLabel(s) {
      return { spring: '🌸 春季', summer: '☀️ 夏季', autumn: '🍂 秋季', winter: '❄️ 冬季' }[s] || s;
    }
    function renderRecommend() {
      const area = document.getElementById('recommendArea');
      if (!area || !allSpots.length) return;
      const season = getSeason();
      const hour = new Date().getHours();
      // Seasonal recommendation logic
      const seasonMap = {
        spring: { ids: ['wulongtan','daminghu','baihuazhou-park','lotus-mountain'], reason: '春天万物复苏，五龙潭樱花盛开，大明湖春意盎然' },
        summer: { ids: ['jiuru','huchenghe','daminghu','minghu-wetland'], reason: '夏日避暑，九如山瀑布清凉，护城河游船惬意' },
        autumn: { ids: ['hongye','qianfo','lingyan','wufengshan'], reason: '秋高气爽，红叶谷层林尽染，千佛山秋色迷人' },
        winter: { ids: ['baotu','museum','hongjialou','shangbu'], reason: '冬日暖阳，趵突泉雾气如仙境，省博室内暖和' }
      };
      const rec = seasonMap[season] || seasonMap.spring;
      // Pick best rated from seasonal list
      const candidates = rec.ids.map(id => allSpots.find(s => s.id === id)).filter(Boolean);
      candidates.sort((a, b) => b.rating - a.rating);
      const pick = candidates[0] || allSpots[0];
      // Night recommendation
      const nightTip = (hour >= 18 || hour < 6) ? '🌙 现在是夜间，推荐夜游景点：趵突泉夜游、宽厚里、护城河灯光秀' : '';
      const priceStr = pick.price === 0 ? '免费' : `¥${pick.price}`;
      area.innerHTML = `
        <div class="recommend-card" role="region" aria-label="今日推荐">
          <span class="rec-season-tag">${getSeasonLabel(season)}</span>
          <div class="rec-label">✨ 今日推荐 · ${rec.reason}</div>
          <h3>${pick.name}</h3>
          <p>${pick.desc}</p>
          <div class="rec-meta">
            <span>⭐ ${pick.rating}</span>
            <span>🎫 ${priceStr}</span>
            <span>⏱ ${pick.dur}</span>
            <span>📅 ${(pick.bestTime||'全年').slice(0,20)}</span>
          </div>
          ${nightTip ? `<div style="margin-top:10px;font-size:.8rem;opacity:.9">${nightTip}</div>` : ''}
          <button class="rec-btn" data-id="${pick.id}">查看详情 →</button>
        </div>`;
      area.querySelector('.rec-btn')?.addEventListener('click', () => {
        const s = allSpots.find(x => x.id === pick.id);
        if (s) openQuickView(s);
      });
    }

    // ═══════════════════════════════════════════
    //  5. 语音导览 (Web Speech API)
    // ═══════════════════════════════════════════
    let currentTTS = null;
    function speakSpot(s) {
      if (currentTTS) { speechSynthesis.cancel(); currentTTS = null; }
      const btn = document.querySelector('.tts-btn');
      if (btn && btn.classList.contains('playing')) {
        btn.classList.remove('playing');
        btn.innerHTML = '🎧 语音导览';
        return;
      }
      if (!('speechSynthesis' in window)) { showToast('浏览器不支持语音合成'); return; }
      const text = `${s.name}。${s.desc}。门票${s.price === 0 ? '免费' : s.price + '元'}。建议游玩时长${s.dur}。${s.tips || ''}`;
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate = 0.92;
      utter.pitch = 1;
      // Try to find a Chinese voice
      const voices = speechSynthesis.getVoices();
      const zhVoice = voices.find(v => v.lang.startsWith('zh'));
      if (zhVoice) utter.voice = zhVoice;
      utter.onend = () => {
        if (btn) { btn.classList.remove('playing'); btn.innerHTML = '🎧 语音导览'; }
        currentTTS = null;
      };
      utter.onerror = () => {
        if (btn) { btn.classList.remove('playing'); btn.innerHTML = '🎧 语音导览'; }
        currentTTS = null;
      };
      speechSynthesis.speak(utter);
      currentTTS = utter;
      if (btn) { btn.classList.add('playing'); btn.innerHTML = '⏸️ 停止朗读'; }
    }

    // ── Enhanced Map with legend filtering + locate me ──
    let leafletMap = null;
    let mapMarkers = [];
    let mapMarkerGroup = null;

    function initLeafletMap() {
      const container = document.getElementById('map-container');
      if (!container || !allSpots.length) return;
      leafletMap = L.map('map-container').setView([36.67, 117.02], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 18
      }).addTo(leafletMap);

      mapMarkerGroup = L.layerGroup().addTo(leafletMap);
      renderMapMarkers('all');

      // Fit bounds
      const bounds = allSpots.filter(s => s.lat && s.lng).map(s => [s.lat, s.lng]);
      if (bounds.length) leafletMap.fitBounds(bounds, { padding: [30, 30] });
    }

    function renderMapMarkers(filterCat) {
      if (!mapMarkerGroup || !leafletMap) return;
      mapMarkerGroup.clearLayers();
      const filtered = filterCat === 'all' ? allSpots : allSpots.filter(s => s.cat === filterCat);
      filtered.forEach(s => {
        if (!s.lat || !s.lng) return;
        const color = catColors[s.cat] || '#c9a96e';
        const icon = L.divIcon({
          className: 'leaflet-div-icon custom-marker',
          html: `<div style="background:${color};color:#fff;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer;border:2px solid #fff">${s.name}</div>`,
          iconSize: [0, 0],
          iconAnchor: [0, 0]
        });
        const marker = L.marker([s.lat, s.lng], { icon });
        marker.bindPopup(`<b>${s.name}</b><br>${s.desc.slice(0, 60)}…`);
        marker.on('click', () => openQuickView(s));
        mapMarkerGroup.addLayer(marker);
      });
    }

    // Map legend filter buttons
    document.querySelectorAll('.map-legend-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.map-legend-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMapMarkers(btn.dataset.mapCat);
      });
    });

    // Locate me button
    document.getElementById('locateMeBtn')?.addEventListener('click', () => {
      if (!navigator.geolocation) { showToast('浏览器不支持定位'); return; }
      showToast('正在定位…');
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        if (leafletMap) {
          leafletMap.setView([latitude, longitude], 15);
          L.marker([latitude, longitude], {
            icon: L.divIcon({
              className: 'leaflet-div-icon custom-marker',
              html: '<div style="background:#ef4444;color:#fff;padding:6px 12px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);border:3px solid #fff">📍 我的位置</div>',
              iconSize: [0, 0],
              iconAnchor: [0, 0]
            })
          }).addTo(leafletMap);
          showToast('✓ 已定位到您的位置');
        }
      }, err => {
        showToast('定位失败：' + (err.message || '请检查权限'));
      }, { enableHighAccuracy: true, timeout: 10000 });
    });

    // Load Leaflet JS
    const leafletScript = document.createElement('script');
    leafletScript.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    leafletScript.onload = () => {
      const tryInit = () => {
        if (allSpots.length) { initLeafletMap(); renderRecommend(); }
        else setTimeout(tryInit, 200);
      };
      tryInit();
      // Pre-load voices for TTS
      if ('speechSynthesis' in window) speechSynthesis.getVoices();
    };
    document.head.appendChild(leafletScript);
  
    // ═══ SHOPIFY-STYLE: 数字计数动画 ═══
    function animateCount(elId, target) {
      const el = document.getElementById(elId);
      if (!el) return;
      const current = parseInt(el.textContent) || 0;
      if (current === target) return;
      const duration = 400;
      const start = performance.now();
      const startVal = current;
      el.style.opacity = '0';
      el.style.transform = 'translateY(10px)';
      requestAnimationFrame(function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        const val = Math.round(startVal + (target - startVal) * eased);
        el.innerHTML = '共 <strong>' + val + '</strong> 个景点';
        el.style.opacity = String(0.3 + 0.7 * eased);
        el.style.transform = 'translateY(' + (10 * (1 - eased)) + 'px)';
        if (progress < 1) requestAnimationFrame(tick);
        else { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }
      });
    }

    // ═══ SHOPIFY-STYLE: 交错入场 IntersectionObserver ═══
    function initRevealObserver() {
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry, index) {
          if (entry.isIntersecting) {
            const el = entry.target;
            const delay = parseInt(el.dataset.staggerIndex || 0) * 60;
            setTimeout(function() {
              el.classList.add('revealed');
              el.classList.add('stagger-in');
            }, delay);
            observer.unobserve(el);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.rv:not(.revealed)').forEach(function(el, i) {
        el.dataset.staggerIndex = i;
        observer.observe(el);
      });
    }
</script>
